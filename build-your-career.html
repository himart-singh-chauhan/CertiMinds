<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Career - CertiMinds</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #fff; color: rgba(0,0,0,0.95); -webkit-font-smoothing: antialiased; }
    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 900px) {
      /* Hero: hide right visualizer */
      .hero-right { display: none !important; }
    }
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .nav-inner { padding: 0 16px !important; }
      .nav-logo { height: 48px !important; }
      /* Hero */
      .hero-grid { grid-template-columns: 1fr !important; }
      /* Journey (Five Steps) */
      .journey-grid { grid-template-columns: 1fr !important; }
      .journey-sticky { position: static !important; }
      /* Gain Cards (Why Organisations Trust...) */
      .gain-card-inner { width: 96% !important; height: auto !important; min-height: unset !important; flex-direction: column !important; top: 0 !important; }
      .gain-card-left { width: 100% !important; border-right: none !important; border-bottom: 1px solid rgba(10,22,40,0.08) !important; flex-direction: row !important; padding: 12px 16px !important; gap: 10px !important; }
      .gain-card-body { flex-direction: column !important; gap: 16px !important; padding: 24px 20px !important; }
      .gain-card-checks { margin-left: 0 !important; flex: none !important; }
      /* FAQ two-column */
      .faq-grid { grid-template-columns: 1fr !important; }
      /* Form rows */
      .form-row { grid-template-columns: 1fr !important; }
      /* Footer */
      .footer-top { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
      .footer-top > div:first-child { grid-column: 1 / -1; }
    }
    @media (max-width: 520px) {
      .footer-top { grid-template-columns: 1fr !important; }
      .hero-ctas { flex-direction: column !important; align-items: stretch !important; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }
    @keyframes scroll-tracks {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .track-inner { display: flex; gap: 12px; animation: scroll-tracks 30s linear infinite; width: max-content; will-change: transform; }
    .animate-up { animation: fadeUp 0.65s ease both; }
    .animate-up-2 { animation: fadeUp 0.65s 0.12s ease both; }
    .animate-up-3 { animation: fadeUp 0.65s 0.24s ease both; }
    .animate-up-4 { animation: fadeUp 0.65s 0.36s ease both; }
    /* ── Scroll Reveal ─────────────────────────────────────── */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

/* ── Nav ──────────────────────────────────────────────────────── */
const Nav = () => {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);
  const [hidden, setHidden] = React.useState(false);
  const lastY = React.useRef(0);

  React.useEffect(() => {
    const onScroll = () => {
      const y = window.scrollY;
      setScrolled(y > 10);
      setHidden(y > lastY.current && y > 80);
      lastY.current = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const links = [
    { label: 'Build Your Team',   href: 'build-your-team.html' },
    { label: 'Build Your Career', href: 'build-your-career.html', active: true },
    { label: 'Our Launchpad',     href: 'our-launchpad.html' },
    { label: 'About Us',          href: 'about-us.html' },
    { label: 'Contact',           href: 'contact.html' },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 200,
      background: scrolled ? 'rgba(255,255,255,0.97)' : 'rgba(255,255,255,0.0)',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(0,0,0,0.08)' : 'none',
      transform: hidden ? 'translateY(-100%)' : 'translateY(0)',
      transition: 'all 0.3s ease',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: 82, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
        <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0 }}>
          <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 52 }} />
        </a>
        <div className="nav-links" style={{ display: 'flex', gap: 4 }}>
          {links.map(({ label, href, active }) => {
            const isActive = active || false;
            return (
              <a key={label} href={href}
                style={{ fontSize: 13.5, fontWeight: isActive ? 600 : 500, color: isActive ? '#0a1628' : '#111111', padding: '8px 16px', borderRadius: 6, textDecoration: 'none', transition: 'color 0.18s', whiteSpace: 'nowrap' }}
                onMouseEnter={e => e.currentTarget.style.color = '#0a1628'}
                onMouseLeave={e => e.currentTarget.style.color = isActive ? '#0a1628' : '#111111'}>
                {label}
              </a>
            );
          })}
        </div>
        <div className="nav-cta" style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
          <a href="contact.html"
            style={{ display: 'inline-flex', alignItems: 'center', fontSize: 13.5, fontWeight: 700, color: '#ffffff', textDecoration: 'none', padding: '9px 22px', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', borderRadius: 9999, border: 'none', transition: 'all 0.2s', whiteSpace: 'nowrap', boxShadow: '0 4px 14px rgba(109,40,217,0.3)' }}
            onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(109,40,217,0.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.boxShadow = '0 4px 14px rgba(109,40,217,0.3)'; }}>
            Let's Talk
          </a>
        </div>
        <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px' }}
          onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
          {[0,1,2].map(i => (
            <span key={i} style={{ width: 22, height: 2, background: '#0a1628', borderRadius: 2, display: 'block', transition: 'all 0.22s',
              transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
              opacity: i===1 && menuOpen ? 0 : 1 }} />
          ))}
        </button>
      </div>
      {menuOpen && (
        <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '12px 24px 20px', display: 'flex', flexDirection: 'column', gap: 2, background: '#ffffff' }}>
          {links.map(({ label, href }) => (
            <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#111111', padding: '11px 12px', borderRadius: 8, textDecoration: 'none' }}>{label}</a>
          ))}
          <a href="contact.html" style={{ textAlign: 'center', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 13.5, fontWeight: 700, padding: '10px 16px', borderRadius: 9999, textDecoration: 'none', marginTop: 10 }}>Let's Talk</a>
        </div>
      )}
    </header>
  );
};

/* ── Hero ─────────────────────────────────────────────────────── */
const Hero = () => {
  const milestones = [
    { step: '01', label: 'Apply', sub: 'Submit your profile' },
    { step: '02', label: 'Assess', sub: 'Aptitude & skills test' },
    { step: '03', label: 'Train',  sub: 'Launchpad programme' },
    { step: '04', label: 'Place',  sub: 'Join an organisation' },
    { step: '05', label: 'Grow',   sub: 'Structured career path' },
  ];

  const tracks = ['Software Engineering', 'Data Engineering', 'AI Engineering', 'Machine Learning', 'Cloud Services', 'DevOps', 'Business Analytics', 'Agile Delivery', 'GovTech', 'Cybersecurity'];

  return (
    <section style={{ background: '#ffffff', minHeight: '100vh', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

      {/* Decorative grid */}
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(21,96,176,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(21,96,176,0.05) 1px, transparent 1px)', backgroundSize: '60px 60px', pointerEvents: 'none' }} />

      {/* Glow orbs */}
      <div style={{ position: 'absolute', top: '20%', left: '-10%', width: 500, height: 500, borderRadius: '50%', background: 'radial-gradient(circle, rgba(21,96,176,0.07) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', bottom: '10%', right: '-5%', width: 400, height: 400, borderRadius: '50%', background: 'radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%)', pointerEvents: 'none' }} />

      {/* Main content */}
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', maxWidth: 1160, margin: '0 auto', padding: '120px 32px 60px', width: '100%', position: 'relative', zIndex: 1 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 64, alignItems: 'center', width: '100%' }} className="hero-grid">

          {/* LEFT - text */}
          <div>
            {/* Eyebrow */}
            <div className="animate-up" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#eef5ff', border: '1px solid #c7ddf8', borderRadius: 9999, padding: '5px 14px', marginBottom: 36 }}>
              
              <span style={{ fontSize: 12, fontWeight: 600, color: '#1560b0', letterSpacing: '0.5px' }}>For Candidates · Qatar</span>
            </div>

            {/* H1 */}
            <h1 className="animate-up-2" style={{ fontSize: 'clamp(2.6rem, 5.5vw, 5rem)', fontWeight: 900, lineHeight: 1.0, letterSpacing: '-3px', marginBottom: 28 }}>
              <span style={{ color: '#000000' }}>Build a Career</span><br />
              <span style={{ background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>in Technology.</span><br />
              <span style={{ fontWeight: 700, fontSize: '1em', letterSpacing: '-1.5px', background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>Starting in Qatar.</span>
            </h1>

            {/* Subheadline */}
            <p className="animate-up-3" style={{ fontSize: '1.05rem', lineHeight: 1.8, color: '#111111', maxWidth: 520, marginBottom: 40 }}>
              If you have the drive and the foundation, we provide the path. A structured training that develops real capability and places you with ambitious organizations across Qatar.
            </p>

            {/* CTAs */}
            <div className="animate-up-4" style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', marginBottom: 48 }}>
              <a href="contact.html"
                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 15, fontWeight: 700, padding: '14px 32px', borderRadius: 9999, textDecoration: 'none', transition: 'all 0.2s', boxShadow: '0 4px 24px rgba(109,40,217,0.4)' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 32px rgba(109,40,217,0.5)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 4px 24px rgba(109,40,217,0.4)'; }}>
                Apply Now →
              </a>
              <a href="our-launchpad.html"
                style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'transparent', color: '#0a1628', fontSize: 15, fontWeight: 600, padding: '14px 28px', borderRadius: 9999, textDecoration: 'none', border: '1.5px solid rgba(10,22,40,0.18)', transition: 'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background = '#f0f7ff'; e.currentTarget.style.color = '#1560b0'; e.currentTarget.style.borderColor = '#1560b0'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#0a1628'; e.currentTarget.style.borderColor = 'rgba(10,22,40,0.18)'; }}>
                See the Launchpad
              </a>
            </div>

            {/* Trust row */}
            <div style={{ display: 'flex', gap: 28, flexWrap: 'wrap' }}>
              {[
                { val: '16 Weeks', lbl: 'Intensive training' },
                { val: '6 Tracks', lbl: 'Specialisation paths' },
                { val: '100%', lbl: 'Qatar-based placements' },
              ].map(({ val, lbl }) => (
                <div key={lbl} style={{ borderLeft: '2px solid rgba(21,96,176,0.35)', paddingLeft: 12 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: '#0a1628', lineHeight: 1 }}>{val}</div>
                  <div style={{ fontSize: 12, color: '#111111', marginTop: 3, fontWeight: 500 }}>{lbl}</div>
                </div>
              ))}
            </div>
          </div>

          {/* RIGHT - career path visualizer */}
          <div className="hero-right" style={{ width: 220, flexShrink: 0, position: 'relative' }}>
            {/* vertical line */}
            <div style={{ position: 'absolute', left: 22, top: 28, bottom: 28, width: 2, background: 'linear-gradient(180deg, #1560b0 0%, rgba(21,96,176,0.08) 100%)', borderRadius: 99 }} />

            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {milestones.map(({ step, label, sub }, i) => {
                const isLast = i === milestones.length - 1;
                return (
                  <div key={step} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '14px 0', position: 'relative' }}>
                    {/* dot */}
                    <div style={{ width: 44, height: 44, borderRadius: '50%', flexShrink: 0, background: i === 0 ? '#1560b0' : '#f0f4fa', border: `2px solid ${i === 0 ? '#1560b0' : 'rgba(0,0,0,0.1)'}`, display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1, transition: 'all 0.2s' }}>
                      <span style={{ fontSize: 10.5, fontWeight: 800, color: i === 0 ? '#fff' : 'rgba(0,0,0,0.3)', letterSpacing: '0.5px' }}>{step}</span>
                    </div>
                    <div>
                      <div style={{ fontSize: 18, fontWeight: 700, color: i === 0 ? '#0a1628' : 'rgba(0,0,0,0.45)', lineHeight: 1.2 }}>{label}</div>
                      <div style={{ fontSize: 14.5, color: '#111111', marginTop: 2 }}>{sub}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* floating badge */}
            <div style={{ position: 'absolute', top: -20, right: -20, background: '#1560b0', borderRadius: 12, padding: '10px 14px', boxShadow: '0 8px 24px rgba(21,96,176,0.4)', zIndex: 2 }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: '#fff', lineHeight: 1 }}>0%</div>
              <div style={{ fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.7)', marginTop: 2, whiteSpace: 'nowrap' }}>Placement fees</div>
            </div>
          </div>

        </div>
      </div>

      {/* Bottom track strip - seamless scrolling marquee */}
      <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '18px 0', overflow: 'hidden', position: 'relative', zIndex: 1, background: '#f8f9fc' }}>
        <div className="track-inner">
          {[...tracks, ...tracks].map((t, i) => (
            <div key={i} style={{ display: 'inline-flex', alignItems: 'center', background: '#ffffff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 9999, padding: '7px 20px', whiteSpace: 'nowrap', flexShrink: 0 }}>
              <span style={{ fontSize: 12.5, fontWeight: 600, color: '#111111' }}>{t}</span>
            </div>
          ))}
        </div>
      </div>

    </section>
  );
};

/* ── Footer ───────────────────────────────────────────────────── */
const Footer = () => {
  const navCols = [
    { heading: 'Services', links: [{ label:'Build Your Team', href:'build-your-team.html' }, { label:'Build Your Career', href:'build-your-career.html' }, { label:'Our Launchpad', href:'our-launchpad.html' }] },
    { heading: 'Company',  links: [{ label:'About Us', href:'about-us.html' }, { label:'Insights', href:'#' }, { label:'Contact', href:'contact.html' }] },
  ];
  const linkStyle = { fontSize:14, color:'#111111', textDecoration:'none', transition:'color 0.18s', display:'inline-block' };
  return (
    <footer style={{ background:'#fff', borderTop:'1px solid rgba(0,0,0,0.08)', padding:'72px 24px 0' }}>
      <div style={{ maxWidth:1200, margin:'0 auto' }}>
        <div className="footer-top" style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:48, paddingBottom:56, borderBottom:'1px solid rgba(0,0,0,0.08)' }}>
          <div>
            <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height:58, marginBottom:20 }} />
            <p style={{ fontSize:14, color:'#111111', lineHeight:1.8, maxWidth:280, marginBottom:28 }}>
              Developing the next generation of tech professionals in Qatar and the Gulf - from day one to day one.
            </p>
            <div style={{ display:'flex', gap:10 }}>
              {[{ href:'https://linkedin.com', title:'LinkedIn', svg:<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg> }].map(({ href, title, svg }) => (
                <a key={title} href={href} target="_blank" rel="noopener noreferrer" title={title}
                  onMouseEnter={e=>{ e.currentTarget.style.background='rgba(11,17,32,0.07)'; e.currentTarget.style.color='#0b1120'; }}
                  onMouseLeave={e=>{ e.currentTarget.style.background='rgba(0,0,0,0.04)'; e.currentTarget.style.color='#111111'; }}
                  style={{ width:38, height:38, borderRadius:'50%', background:'rgba(0,0,0,0.04)', border:'1px solid rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', color:'#111111', textDecoration:'none', transition:'background 0.18s, color 0.18s' }}>
                  {svg}
                </a>
              ))}
            </div>
          </div>
          {navCols.map(col => (
            <div key={col.heading}>
              <div style={{ fontSize:11, fontWeight:700, color:'#111111', letterSpacing:'2px', textTransform:'uppercase', marginBottom:20 }}>{col.heading}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                {col.links.map(({ label, href }) => (
                  <a key={label} href={href}
                    onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                    onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                    style={linkStyle}>{label}</a>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:16, padding:'22px 0 26px' }}>
          <span style={{ fontSize:13, color:'#111111' }}>© CertiMinds 2026. All rights reserved.</span>
          <div style={{ display:'flex', gap:24 }}>
            {[{ label:'Privacy Policy', href:'#' }, { label:'Terms of Use', href:'#' }].map(({ label, href }) => (
              <a key={label} href={href}
                onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                style={{ fontSize:13, color:'#111111', textDecoration:'none', transition:'color 0.18s' }}>{label}</a>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
};

/* ── Journey ─────────────────────────────────────────────────── */
const STEPS = [
  {
    num: '01',
    title: 'Register Your Interest',
    body: 'Tell us who you are and what you are working toward. Elite candidates are shortlisted for the next stage.',
    icon: '✦',
    tag: 'Application Open',
  },
  {
    num: '02',
    title: 'Assessment',
    body: 'We look beyond grades and qualifications. Our assessment focuses on your potential, communication ability and technical foundations.',
    icon: '�-�',
    tag: 'Potential-First',
  },
  {
    num: '03',
    title: 'Launchpad',
    body: 'Selected candidates join our intensive training programme - hands-on technical and professional development with AI training built in throughout.',
    icon: '⬡',
    tag: 'Full-Time',
  },
  {
    num: '04',
    title: 'Placement',
    body: 'You join an ambitious organisation in Qatar, contributing to real projects and playing your part in Qatar\'s continued growth.',
    icon: '�-�',
    tag: '0% Placement Fees',
  },
  {
    num: '05',
    title: 'Progression',
    body: 'From the moment you are placed, CertiMinds supports your ongoing development and career progression every step of the way.',
    icon: '▲',
    tag: 'Lifetime Support',
  },
];

const Journey = () => {
  const [active, setActive] = React.useState(0);
  const step = STEPS[active];
  return (
    <section style={{ background: '#fff', padding: '100px 24px 112px', position: 'relative', overflow: 'hidden' }}>
      {/* subtle bg grid */}
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(21,96,176,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(21,96,176,0.04) 1px, transparent 1px)', backgroundSize: '56px 56px', pointerEvents: 'none' }} />

      <div style={{ maxWidth: 1160, margin: '0 auto', position: 'relative', zIndex: 1 }}>

        {/* Section label + heading */}
        <div style={{ marginBottom: 64 }}>

const GainCard = React.memo(({ i, c, total, sectionRef }) => {
  const containerRef = React.useRef(null);
  const innerRef     = React.useRef(null);

  React.useEffect(() => {
    let raf;
    const update = () => {
      if (!containerRef.current || !sectionRef.current || !innerRef.current) return;
      const secRect       = sectionRef.current.getBoundingClientRect();
      const secScrollable = Math.max(1, sectionRef.current.scrollHeight - window.innerHeight);
      const secP          = Math.max(0, Math.min(1, -secRect.top / secScrollable));
      const targetScale   = 1 - (total - i) * 0.05;
      const start         = i / total;
      const progress      = Math.max(0, Math.min(1, (secP - start) / (1 - start)));
      innerRef.current.style.transform = `scale(${1 - (1 - targetScale) * progress})`;
    };
    const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
    window.addEventListener('scroll', onScroll, { passive: true });
    update();
    return () => { window.removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
  }, [i, total]);

  return (
    <div ref={containerRef} style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'sticky', top: 0, zIndex: i + 1 }}>
      <div ref={innerRef} className="gain-card-inner" style={{ background: c.bg, transformOrigin: 'top center', position: 'relative', top: `calc(-5vh + ${i * 25}px)`, width: '78%', height: 420, borderRadius: 24, overflow: 'hidden', willChange: 'transform', boxShadow: '0 20px 60px rgba(100,120,200,0.22)', display: 'flex' }}>

      <div style={{ position: 'absolute', top: 0, right: 0, width: 400, height: 300, background: 'radial-gradient(ellipse at top right, rgba(56,189,248,0.08) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', bottom: 0, left: 0, width: 350, height: 280, background: 'radial-gradient(ellipse at bottom left, rgba(139,92,246,0.08) 0%, transparent 70%)', pointerEvents: 'none' }} />

      <div style={{ maxWidth: 860, margin: '0 auto', position: 'relative', zIndex: 1 }}>

        {/* Header */}
        <div style={{ textAlign: 'center', marginBottom: 64 }}>

          <h2 style={{ fontSize: 'clamp(2.2rem, 4.5vw, 3.6rem)', fontWeight: 900, color: '#ffffff', letterSpacing: '-2px', lineHeight: 1.05, margin: '0 0 20px' }}>
            Take the step.<br /><span style={{ color: '#38bdf8' }}>We'll handle the rest.</span>
          </h2>
          <p style={{ fontSize: '1rem', color: 'rgba(255,255,255,0.5)', lineHeight: 1.8, maxWidth: 480, margin: '0 auto' }}>
            Apply to CertiMinds and take the first step toward a career in tech that's built to last.
          </p>
        </div>

        {/* Form card */}
        {submitted ? (
          <div style={{ background: 'rgba(255,255,255,0.05)', border: '1.5px solid rgba(56,189,248,0.3)', borderRadius: 24, padding: '64px 48px', textAlign: 'center' }}>
            <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'rgba(56,189,248,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 24px' }}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h3 style={{ fontSize: '1.8rem', fontWeight: 900, color: '#ffffff', letterSpacing: '-0.8px', marginBottom: 12 }}>Application Received</h3>
            <p style={{ fontSize: '1rem', color: 'rgba(255,255,255,0.55)', lineHeight: 1.75, maxWidth: 420, margin: '0 auto' }}>
              Thank you for applying. Our team will review your application and be in touch within 3–5 business days.
            </p>
          </div>
        ) : (
          <form onSubmit={handleSubmit} style={{ background: 'rgba(255,255,255,0.04)', border: '1.5px solid rgba(255,255,255,0.1)', borderRadius: 24, padding: '52px 52px 48px' }}>
            <style>{`
              input::placeholder, textarea::placeholder, select option:first-child { color: rgba(255,255,255,0.25) !important; }
              select option { background: #0f1f3a; color: #fff; }
              input[type="file"] { display: none; }
            `}</style>

            {/* Row 1: Full name + Email */}
            <div className="form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
              <div>
                <label style={labelStyle}>Full Name *</label>
                <input required type="text" placeholder="Your full name" value={form.name}
                  onChange={e => set('name', e.target.value)}
                  onFocus={() => setFocused('name')} onBlur={() => setFocused(null)}
                  style={inputStyle('name')} />
              </div>
              <div>
                <label style={labelStyle}>Email Address *</label>
                <input required type="email" placeholder="you@email.com" value={form.email}
                  onChange={e => set('email', e.target.value)}
                  onFocus={() => setFocused('email')} onBlur={() => setFocused(null)}
                  style={inputStyle('email')} />
              </div>
            </div>

            {/* Row 2: Phone + Background */}
            <div className="form-row" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
              <div>
                <label style={labelStyle}>Phone Number</label>
                <input type="tel" placeholder="+974 xxxx xxxx" value={form.phone}
                  onChange={e => set('phone', e.target.value)}
                  onFocus={() => setFocused('phone')} onBlur={() => setFocused(null)}
                  style={inputStyle('phone')} />
              </div>
              <div>
                <label style={labelStyle}>Degree or Background *</label>
                <input required type="text" placeholder="e.g. BSc Computer Science" value={form.background}
                  onChange={e => set('background', e.target.value)}
                  onFocus={() => setFocused('background')} onBlur={() => setFocused(null)}
                  style={inputStyle('background')} />
              </div>
            </div>

            {/* Row 3: Area of interest */}
            <div style={{ marginBottom: 20 }}>
              <label style={labelStyle}>Area of Interest *</label>
              <select required value={form.interest} onChange={e => set('interest', e.target.value)}
                onFocus={() => setFocused('interest')} onBlur={() => setFocused(null)}
                style={{ ...inputStyle('interest'), appearance: 'none', cursor: 'pointer', color: form.interest ? '#ffffff' : 'rgba(255,255,255,0.25)' }}>
                <option value="" disabled>Select your area of interest</option>
                {interests.map(opt => <option key={opt} value={opt}>{opt}</option>)}
              </select>
            </div>

            {/* Row 4: Motivation */}
            <div style={{ marginBottom: 20 }}>
              <label style={labelStyle}>Short Motivation Statement *</label>
              <textarea required rows={4} placeholder="Tell us why you want to join the CertiMinds programme and what you hope to achieve..." value={form.motivation}
                onChange={e => set('motivation', e.target.value)}
                onFocus={() => setFocused('motivation')} onBlur={() => setFocused(null)}
                style={{ ...inputStyle('motivation'), resize: 'vertical', minHeight: 110, lineHeight: 1.7 }} />
            </div>



            {/* Submit */}
            <button type="submit" style={{
              width: '100%', padding: '18px', borderRadius: 14, border: 'none',
              background: 'linear-gradient(135deg, #1560b0, #3b82f6)',
              color: '#ffffff', fontSize: '1rem', fontWeight: 800, letterSpacing: '0.2px',
              cursor: 'pointer', transition: 'opacity 0.2s, transform 0.2s',
              boxShadow: '0 10px 32px rgba(21,96,176,0.4)',
            }}
              onMouseEnter={e => { e.currentTarget.style.opacity = '0.9'; e.currentTarget.style.transform = 'translateY(-1px)'; }}
              onMouseLeave={e => { e.currentTarget.style.opacity = '1'; e.currentTarget.style.transform = 'none'; }}
            >
              Apply Now →
            </button>

            <p style={{ textAlign: 'center', marginTop: 18, fontSize: 12, color: 'rgba(255,255,255,0.25)' }}>
              Your information is kept private and never shared with third parties.
            </p>
          </form>
        )}
      </div>
    </section>
  );
};

const App = () => (
  <>
    <Nav />
    <Hero />
    <Journey />
    <WhatYouGain />
    <FAQs />
    <ApplyCTA />
    <Footer />
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
  (function(){
    if(!('IntersectionObserver' in window))return;
    var io=new IntersectionObserver(function(ens){ens.forEach(function(en){if(en.isIntersecting){var el=en.target;el.style.opacity='1';el.style.transform='none';io.unobserve(el);}});},{threshold:0.09,rootMargin:'0px 0px -32px 0px'});
    function boot(){document.querySelectorAll('section,footer').forEach(function(el){var r=el.getBoundingClientRect();if(r.top>=window.innerHeight*0.88){el.style.cssText+=';opacity:0;transform:translateY(26px);transition:opacity 0.7s ease,transform 0.7s ease;';io.observe(el);}});}
    var root=document.getElementById('root');
    if(root&&root.firstChild){boot();}
    else if(root){var mo=new MutationObserver(function(){if(root.firstChild){mo.disconnect();setTimeout(boot,80);}});mo.observe(root,{childList:true});}
  })();
  </script>
</body>
</html>
