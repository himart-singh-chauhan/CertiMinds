                  {link.label}

            <div className="nav-cta" style={{ display: 'flex', alignItems: 'center' }}>
              <a href="contact.html" style={{ background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 14, fontWeight: 600, padding: '8px 18px', borderRadius: 9999, textDecoration: 'none', transition: 'background 0.15s', boxShadow: '0 4px 14px rgba(109,40,217,0.3)' }}

              </a>

            <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}
        onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
              {[0, 1, 2].map((i) =>
          <span key={i} style={{ width: 22, height: 2, background: 'rgba(0,0,0,0.8)', borderRadius: 2, display: 'block', transition: 'all 0.2s',
            transform: i === 0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i === 2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',

      <div style={{ background: '#fff', borderTop: '1px solid rgba(0,0,0,0.1)', padding: '16px 24px 24px', display: 'flex', flexDirection: 'column', gap: 4 }}>

};

        onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(0,0,0,0.09)'}
        onMouseLeave={(e) => e.currentTarget.style.background = 'rgba(0,0,0,0.05)'}>
                See the Launchpad
              </a>
            </div>
          </div>

/* -- Icons ------------------------------------------------------ */
const iconProps = { width: 22, height: 22, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "1.75", strokeLinecap: "round", strokeLinejoin: "round" };
const DiscoverIcon = () => <svg {...iconProps}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /><path d="M11 8v6" /><path d="M8 11h6" /></svg>;
const SelectIcon = () => <svg {...iconProps}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>;
const DevelopIcon = () => <svg {...iconProps}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>;

  detail: 'Typical duration: 1�2 weeks',
  icon: <DiscoverIcon />
},
{
  n: '02', label: 'Candidate selection',
  headline: 'We identify the right people',
  body: 'From our pipeline of assessed candidates, we shortlist individuals whose aptitude and trajectory match your requirements. You review profiles before anyone enters development.',
  detail: 'You approve before development begins',
  icon: <SelectIcon />
},
{
  n: '03', label: 'Launchpad development',
  headline: 'We develop them for your context',
  body: 'Selected candidates enter the Launchpad programme - a structured multi-month development track covering technical skills, professional foundations, and your specific domain context.',
  detail: 'Typically 4�6 months',
  icon: <DevelopIcon />
},
{
  n: '04', label: 'Pre-placement alignment',
  headline: 'We align before they arrive',
  body: 'Before placement, consultants go through a context-setting phase specific to your organisation - your tools, culture, team dynamics, and expectations. No surprises on day one.',

},

  detail: 'Long-term partnership model',
  icon: <GrowIcon />
}];


const EngagementModel = () => {

  return (

};

/* -- FAQ -------------------------------------------------------- */
const FAQS = [
{ q: "We already have a recruitment agency. Why do we need CertiMinds?", a: "Recruitment agencies find existing talent. We build it. If you can't find the right people in the market - or if the talent you hire arrives and still needs significant investment - that's the gap we close. We're not a faster recruiter. We're a different solution entirely." },
{ q: "How long does the full process take from engagement to placement?", a: "The typical timeline from initial discovery to placement is 6�8 months. The majority of that is development time in the Launchpad programme. We plan with your hiring pipeline in mind, so engagements can be structured to meet your timelines." },
{ q: "Do we get to review candidates before development begins?", a: "Yes. After initial selection, you review candidate profiles before anyone enters the development programme. You're involved in the decision, not just the outcome." },
{ q: "What sectors and technology areas do your consultants cover?", a: "Our current capability tracks include: AI & Data, Cloud & Infrastructure, Software Engineering, and Business Analysis. We expand tracks based on demand from partner organisations." },
{ q: "What happens if a placement doesn't work out?", a: "We work with you and the consultant to understand the issue and resolve it. Our 30/60/90-day check-in structure is designed to catch misalignments early. If a placement is genuinely not the right fit, we work to find a resolution - including re-placement where appropriate." },

              <h2 style={{ fontSize: 'clamp(1.75rem, 3.5vw, 2.5rem)', fontWeight: 700, lineHeight: 1.1, letterSpacing: '-1px', color: '#111111', fontFeatureSettings: '"lnum","locl"' }}>Questions we get asked.</h2>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>

          <div key={i} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.09)', borderRadius: 8, overflow: 'hidden' }}>

                      </svg>
                    </span>
                  </button>
                  {open === i &&
            <div style={{ padding: '4px 24px 22px', fontSize: 14, lineHeight: 1.8, color: '#111111' }}>{faq.a}</div>

  <script>
  (function(){
    if(!('IntersectionObserver' in window))return;
    var io=new IntersectionObserver(function(ens){ens.forEach(function(en){if(en.isIntersecting){var el=en.target;el.style.opacity='1';el.style.transform='none';io.unobserve(el);}});},{threshold:0.09,rootMargin:'0px 0px -32px 0px'});
    function boot(){document.querySelectorAll('section,footer').forEach(function(el){var r=el.getBoundingClientRect();if(r.top>=window.innerHeight*0.88){el.style.cssText+=';opacity:0;transform:translateY(26px);transition:opacity 0.7s ease,transform 0.7s ease;';io.observe(el);}});}
    var root=document.getElementById('root');
    if(root&&root.firstChild){boot();}
    else if(root){var mo=new MutationObserver(function(){if(root.firstChild){mo.disconnect();setTimeout(boot,80);}});mo.observe(root,{childList:true});}
  })();
  </script>
