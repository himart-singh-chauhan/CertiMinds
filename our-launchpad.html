<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Launchpad — CertiMinds</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #fff; color: rgba(0,0,0,0.95); -webkit-font-smoothing: antialiased; }
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .pillars-grid { grid-template-columns: 1fr !important; }
      .tracks-grid { grid-template-columns: 1fr 1fr !important; }
      .crosslink-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 520px) {
      .tracks-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr !important; }
    }
    /* ── Scroll Reveal ─────────────────────────────────────── */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    /* ── Nav ──────────────────────────────────────────────────────── */
    const Nav = () => {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [scrolled, setScrolled] = React.useState(false);
      const [hidden, setHidden] = React.useState(false);
      const lastY = React.useRef(0);

      React.useEffect(() => {
        const fn = () => {
          const y = window.scrollY;
          setScrolled(y > 16);
          if (y > lastY.current && y > 80) setHidden(true);
          else setHidden(false);
          lastY.current = y;
        };
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { label: 'Build Your Team',   href: 'build-your-team.html' },
        { label: 'Build Your Career', href: 'build-your-career.html' },
        { label: 'Our Launchpad',     href: 'our-launchpad.html' },
        { label: 'About Us',          href: 'about-us.html' },
        { label: 'Contact',           href: 'contact.html' },
      ];

      return (
        <header style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: '#ffffff',
          borderBottom: scrolled ? '1px solid rgba(0,0,0,0.08)' : '1px solid transparent',
          boxShadow: scrolled ? '0 2px 16px rgba(0,0,0,0.06)' : 'none',
          transform: hidden ? 'translateY(-100%)' : 'translateY(0)',
          transition: 'transform 0.35s cubic-bezier(0.4,0,0.2,1), border-color 0.3s, box-shadow 0.3s',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: 82, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
            <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0 }}>
              <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 52 }} />
            </a>
            <div className="nav-links" style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1, justifyContent: 'center' }}>
              {links.map(({ label, href }) => {
                const isActive = window.location.pathname.includes('our-launchpad') && href === 'our-launchpad.html';
                return (
                  <a key={label} href={href} style={{
                    fontSize: 13.5, fontWeight: isActive ? 600 : 500,
                    color: isActive ? '#0a1628' : '#111111',
                    padding: '8px 16px', textDecoration: 'none', borderRadius: 6,
                    transition: 'color 0.18s', whiteSpace: 'nowrap',
                  }}
                  onMouseEnter={e => e.currentTarget.style.color = '#0a1628'}
                  onMouseLeave={e => e.currentTarget.style.color = isActive ? '#0a1628' : '#111111'}>
                    {label}
                  </a>
                );
              })}
            </div>
            <div className="nav-cta" style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
              <a href="contact.html"
                style={{ display: 'inline-flex', alignItems: 'center', fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', padding: '9px 22px', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', borderRadius: 9999, border: 'none', transition: 'all 0.2s', whiteSpace: 'nowrap', boxShadow: '0 4px 14px rgba(109,40,217,0.3)' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(109,40,217,0.45)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.boxShadow = '0 4px 14px rgba(109,40,217,0.3)'; }}>
                Let's Talk
              </a>
            </div>
            <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px' }}
              onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
              {[0,1,2].map(i => (
                <span key={i} style={{ width: 22, height: 2, background: '#0a1628', borderRadius: 2, display: 'block', transition: 'all 0.22s',
                  transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
                  opacity: i===1 && menuOpen ? 0 : 1 }} />
              ))}
            </button>
          </div>
          {menuOpen && (
            <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '12px 24px 20px', display: 'flex', flexDirection: 'column', gap: 2, background: '#ffffff' }}>
              {links.map(({ label, href }) => (
                <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#111111', padding: '11px 12px', borderRadius: 8, textDecoration: 'none', transition: 'background 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(10,22,40,0.05)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>{label}</a>
              ))}
              <a href="contact.html" style={{ textAlign: 'center', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 13.5, fontWeight: 700, padding: '10px 16px', borderRadius: 9999, textDecoration: 'none', marginTop: 10 }}>Let's Talk</a>
            </div>
          )}
        </header>
      );
    };

    /* ── Hero ─────────────────────────────────────────────────────── */
    const Hero = () => {
      const clients = [
        { name: 'Qatar Airways',  initials: 'QA', color: '#8B0000' },
        { name: 'QatarEnergy',    initials: 'QE', color: '#003087' },
        { name: 'Ooredoo',        initials: 'OO', color: '#E4002B' },
        { name: 'Vodafone Qatar', initials: 'VF', color: '#E60000' },
        { name: 'Meeza',          initials: 'MZ', color: '#0066CC' },
        { name: 'Milaha',         initials: 'ML', color: '#002366' },
        { name: 'Mannai Corp',    initials: 'MC', color: '#1a1a2e' },
        { name: 'CBQ',            initials: 'CB', color: '#006341' },
      ];
      return (
        <section style={{ background: '#fff', padding: '52px 32px 88px', overflow: 'hidden', position: 'relative' }}>
          <style>{`
            @keyframes lpFadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
            @keyframes lpMarquee { from { transform:translateX(0); } to { transform:translateX(-50%); } }
            @keyframes lpPing { 75%,100% { transform:scale(2); opacity:0; } }
            .lp-fade { animation: lpFadeIn 0.8s ease-out forwards; opacity:0; }
            .lp-mq   { animation: lpMarquee 38s linear infinite; }
            .lp-ping { animation: lpPing 1.5s cubic-bezier(0,0,0.2,1) infinite; }
            .lp-d1 { animation-delay:0.1s; } .lp-d2 { animation-delay:0.2s; }
            .lp-d3 { animation-delay:0.3s; } .lp-d4 { animation-delay:0.4s; }
            .lp-d5 { animation-delay:0.5s; }
            @media (max-width: 900px) { .lp-grid { grid-template-columns: 1fr !important; } .lp-right { margin-top: 0 !important; max-width: 560px !important; } }
          `}</style>

          <div style={{ maxWidth: 1180, margin: '0 auto' }}>
            <div className="lp-grid" style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1.1fr) minmax(0,0.9fr)', gap: 64, alignItems: 'center' }}>

              {/* ── LEFT COLUMN ── */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 30, paddingTop: 24 }}>

                {/* Badge */}
                <div className="lp-fade lp-d1">
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#eef6ff', color: '#097fe8', fontSize: 11, fontWeight: 700, letterSpacing: '1.5px', textTransform: 'uppercase', padding: '6px 14px', borderRadius: 9999, border: '1px solid rgba(0,117,222,0.15)' }}>
                    The CertiMinds Programme
                  </span>
                </div>

                {/* H1 */}
                <h1 className="lp-fade lp-d2" style={{ fontSize: 'clamp(2.8rem, 5.5vw, 4.75rem)', fontWeight: 700, lineHeight: 1.0, letterSpacing: '-2.5px', color: '#111111', margin: 0, maskImage: 'linear-gradient(180deg, black 0%, black 85%, rgba(0,0,0,0.4) 100%)', WebkitMaskImage: 'linear-gradient(180deg, black 0%, black 85%, rgba(0,0,0,0.4) 100%)' }}>
                  Not a bootcamp.<br />
                  Not a recruiter.<br />
                  <span style={{ color: '#0075de' }}>A Career Built Properly.</span>
                </h1>

                {/* Sub */}
                <p className="lp-fade lp-d3" style={{ fontSize: '1.1rem', lineHeight: 1.75, color: '#111111', maxWidth: 560, margin: 0 }}>
                  Our Launchpad programme is where selected candidates are developed into work-ready tech consultants. Structured, intensive, and built around what Qatar's technology sector actually needs today. Depth over speed. Rigor over volume.
                </p>

                {/* CTAs */}
                <div className="lp-fade lp-d4" style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                  <a href="build-your-career.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 14, fontWeight: 600, padding: '13px 28px', borderRadius: 9999, textDecoration: 'none', transition: 'all 0.2s', boxShadow: 'rgba(109,40,217,0.28) 0 6px 20px', letterSpacing: '0.1px' }}
                    onMouseEnter={e => { e.currentTarget.style.background='linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='rgba(109,40,217,0.45) 0 10px 28px'; }}
                    onMouseLeave={e => { e.currentTarget.style.background='linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='rgba(109,40,217,0.28) 0 6px 20px'; }}>
                    Launch my career
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                  </a>
                  <a href="build-your-team.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'transparent', color: '#111111', fontSize: 14, fontWeight: 600, padding: '12px 28px', borderRadius: 9999, textDecoration: 'none', transition: 'all 0.2s', border: '1.5px solid rgba(0,0,0,0.15)' }}
                    onMouseEnter={e => { e.currentTarget.style.background='rgba(0,0,0,0.04)'; e.currentTarget.style.borderColor='rgba(0,0,0,0.3)'; }}
                    onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='rgba(0,0,0,0.15)'; }}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="rgba(0,0,0,0.65)" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Strengthen my team
                  </a>
                </div>
              </div>

              {/* ── RIGHT COLUMN ── */}
              <div className="lp-right" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>

                {/* Stats Card */}
                <div className="lp-fade lp-d5" style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.09)', borderRadius: 20, padding: '28px 26px', boxShadow: 'rgba(0,0,0,0.06) 0 8px 32px, rgba(0,0,0,0.03) 0 2px 8px', position: 'relative', overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', top: -50, right: -50, width: 180, height: 180, borderRadius: '50%', background: 'radial-gradient(ellipse, rgba(0,117,222,0.06) 0%, transparent 70%)', pointerEvents: 'none' }} />
                  <div style={{ position: 'relative' }}>

                    {/* Top metric */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
                      <div style={{ width: 46, height: 46, borderRadius: 12, background: '#f0f7ff', border: '1px solid rgba(0,117,222,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0075de" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                      </div>
                      <div>
                        <div style={{ fontSize: '1.75rem', fontWeight: 800, letterSpacing: '-1px', color: '#111111', lineHeight: 1 }}>200+</div>
                        <div style={{ fontSize: 12, color: '#111111', marginTop: 3 }}>Graduates Placed</div>
                      </div>
                    </div>

                    {/* Progress bar */}
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                        <span style={{ fontSize: 12, color: '#111111' }}>Placement Success Rate</span>
                        <span style={{ fontSize: 12, fontWeight: 700, color: '#111111' }}>94%</span>
                      </div>
                      <div style={{ height: 7, background: '#f0f0f0', borderRadius: 9999, overflow: 'hidden' }}>
                        <div style={{ height: '100%', width: '94%', borderRadius: 9999, background: 'linear-gradient(90deg, #0075de 0%, #213183 100%)' }} />
                      </div>
                    </div>

                    <div style={{ height: 1, background: 'rgba(0,0,0,0.07)', marginBottom: 18 }} />

                    {/* Mini stats — 3 equal columns, no flex-divider hack */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 0 }}>
                      {[{ v: '6+', l: 'Months' }, { v: '7', l: 'Tracks' }, { v: '100%', l: 'Mentored' }].map((item, i) => (
                        <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '4px 0', borderRight: i < 2 ? '1px solid rgba(0,0,0,0.08)' : 'none' }}>
                          <span style={{ fontSize: '1.15rem', fontWeight: 800, color: '#111111', letterSpacing: '-0.4px' }}>{item.v}</span>
                          <span style={{ fontSize: 9.5, fontWeight: 700, color: '#111111', letterSpacing: '0.7px', textTransform: 'uppercase' }}>{item.l}</span>
                        </div>
                      ))}
                    </div>

                    {/* Pills */}
                    <div style={{ display: 'flex', gap: 8, marginTop: 20, flexWrap: 'wrap' }}>
                      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, borderRadius: 9999, border: '1px solid rgba(0,0,0,0.1)', background: '#fafafa', padding: '5px 12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.6px', color: '#111111', textTransform: 'uppercase' }}>
                        <span style={{ position: 'relative', display: 'inline-flex', width: 8, height: 8 }}>
                          <span className="lp-ping" style={{ position: 'absolute', inset: 0, borderRadius: '50%', background: '#22c55e', opacity: 0.6 }} />
                          <span style={{ position: 'relative', width: 8, height: 8, borderRadius: '50%', background: '#22c55e', display: 'inline-block' }} />
                        </span>
                        Enrolling Now
                      </div>
                      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, borderRadius: 9999, border: '1px solid rgba(0,0,0,0.1)', background: '#fafafa', padding: '5px 12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.6px', color: '#111111', textTransform: 'uppercase' }}>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="#f59e0b" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        Qatar-Focused
                      </div>
                    </div>
                  </div>
                </div>

                {/* Marquee Card */}
                <div className="lp-fade lp-d5" style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.09)', borderRadius: 20, paddingTop: 20, paddingBottom: 20, boxShadow: 'rgba(0,0,0,0.04) 0 4px 16px', overflow: 'hidden' }}>
                  <p style={{ fontSize: 10.5, fontWeight: 700, color: '#111111', letterSpacing: '1px', textTransform: 'uppercase', paddingLeft: 22, paddingRight: 22, marginBottom: 14 }}>Graduates placed at</p>
                  <div style={{ position: 'relative', overflow: 'hidden', maskImage: 'linear-gradient(to right, transparent, black 12%, black 88%, transparent)', WebkitMaskImage: 'linear-gradient(to right, transparent, black 12%, black 88%, transparent)' }}>
                    <div className="lp-mq" style={{ display: 'flex', gap: 24, whiteSpace: 'nowrap', paddingLeft: 12 }}>
                      {[...clients, ...clients, ...clients].map((c, i) => (
                        <div key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 7, opacity: 0.4, transition: 'opacity 0.2s', cursor: 'default' }}
                          onMouseEnter={e => e.currentTarget.style.opacity = '1'}
                          onMouseLeave={e => e.currentTarget.style.opacity = '0.4'}>
                          <div style={{ width: 26, height: 26, borderRadius: 7, background: c.color, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            <span style={{ fontSize: 8.5, fontWeight: 800, color: '#fff', letterSpacing: '0.2px' }}>{c.initials}</span>
                          </div>
                          <span style={{ fontSize: 12.5, fontWeight: 700, color: '#111111', letterSpacing: '-0.2px' }}>{c.name}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ── Three Pillars ────────────────────────────────────────────── */
    const Pillars = () => (
      <section style={{ background: '#f6f5f4', padding: '96px 32px' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto' }}>
          <div style={{ textAlign: 'center', marginBottom: 64 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: '#097fe8', letterSpacing: '1.5px', textTransform: 'uppercase', background: '#eef6ff', padding: '5px 14px', borderRadius: 9999, display: 'inline-block', marginBottom: 20, border: '1px solid rgba(0,117,222,0.15)' }}>Programme philosophy</span>
            <h2 style={{ fontSize: 'clamp(2rem, 4.5vw, 3rem)', fontWeight: 800, lineHeight: 1.05, letterSpacing: '-1.5px', marginBottom: 18, background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>Built on three pillars.</h2>
            <p style={{ fontSize: '1rem', color: '#111111', maxWidth: 480, margin: '0 auto', lineHeight: 1.7 }}>Every aspect of the Launchpad is designed around a clear philosophy. These three pillars shape everything — how we select, how we develop, and how we place.</p>
          </div>

          <div className="pillars-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 20 }}>
            {[
              {
                n: '01',
                color: '#0075de',
                accentBg: '#eef6ff',
                label: 'Depth over speed',
                headline: 'Months, not weeks',
                body: 'Short courses produce surface knowledge. The Launchpad runs over several months because that\'s what it takes to build genuine capability. We don\'t rush people into placements — we prepare them properly.',
                points: ['Structured multi-month curriculum', 'Milestone-based progression', 'No shortcuts, no padding'],
              },
              {
                n: '02',
                color: '#213183',
                accentBg: '#eef0fb',
                label: 'Whole professional, not just technician',
                headline: 'Technical and professional, both',
                body: 'A consultant who can write code but can\'t communicate with a client is half a professional. The Launchpad builds technical competence and professional foundations simultaneously — consulting skills, communication, and business context are not optional extras.',
                points: ['Technical track + professional skills', 'Consulting and communication', 'Business and domain context'],
              },
              {
                n: '03',
                color: '#2a9d99',
                accentBg: '#edfafa',
                label: 'Context is everything',
                headline: 'Developed for the Gulf',
                body: 'Generic international training programmes are designed for generic markets. The Launchpad is built for Qatar and the Gulf — the organisations, the culture, the regulatory environment, and the specific technology challenges that matter here.',
                points: ['Qatar and Gulf market focus', 'Local organisational context', 'Relevant domain knowledge'],
              },
            ].map(({ n, color, accentBg, label, headline, body, points }) => (
              <div key={n} style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.07)', borderRadius: 20, padding: '36px 30px 30px', boxShadow: 'rgba(0,0,0,0.05) 0 6px 24px, rgba(0,0,0,0.02) 0 1px 4px', display: 'flex', flexDirection: 'column', gap: 0, position: 'relative', overflow: 'hidden' }}>
                {/* subtle top color bar */}
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 3, background: color, borderRadius: '20px 20px 0 0' }} />

                {/* badge row */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
                  <div style={{ width: 34, height: 34, borderRadius: 10, background: accentBg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <span style={{ fontSize: 13, fontWeight: 800, color, letterSpacing: '-0.3px' }}>{n}</span>
                  </div>
                  <span style={{ fontSize: 10.5, fontWeight: 700, color, letterSpacing: '0.8px', textTransform: 'uppercase', lineHeight: 1.4 }}>{label}</span>
                </div>

                {/* headline */}
                <h3 style={{ fontSize: '1.2rem', fontWeight: 800, lineHeight: 1.25, letterSpacing: '-0.4px', color: '#111111', marginBottom: 12 }}>{headline}</h3>

                {/* body */}
                <p style={{ fontSize: 13.5, lineHeight: 1.8, color: '#111111', flexGrow: 1, marginBottom: 22 }}>{body}</p>

                {/* checklist */}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 9, paddingTop: 18, borderTop: `1px solid ${accentBg}` }}>
                  {points.map(pt => (

                  {[{ href:'https://linkedin.com', title:'LinkedIn', svg:<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg> }].map(({ href, title, svg }) => (
                    <a key={title} href={href} target="_blank" rel="noopener noreferrer" title={title}
                      onMouseEnter={e=>{ e.currentTarget.style.background='rgba(11,17,32,0.07)'; e.currentTarget.style.color='#0b1120'; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background='rgba(0,0,0,0.04)'; e.currentTarget.style.color='#111111'; }}
                      style={{ width:38, height:38, borderRadius:'50%', background:'rgba(0,0,0,0.04)', border:'1px solid rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', color:'#111111', textDecoration:'none', transition:'background 0.18s, color 0.18s' }}>
                      {svg}
                    </a>
                  ))}
                </div>
              </div>
              {navCols.map(col => (
                <div key={col.heading}>
                  <div style={{ fontSize:11, fontWeight:700, color:'#111111', letterSpacing:'2px', textTransform:'uppercase', marginBottom:20 }}>{col.heading}</div>
                  <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                    {col.links.map(({ label, href }) => (
                      <a key={label} href={href}
                        onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                        onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                        style={linkStyle}>{label}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:16, padding:'22px 0 26px' }}>
              <span style={{ fontSize:13, color:'#111111' }}>© CertiMinds 2026. All rights reserved.</span>
              <div style={{ display:'flex', gap:24 }}>
                {[{ label:'Privacy Policy', href:'#' }, { label:'Terms of Use', href:'#' }].map(({ label, href }) => (
                  <a key={label} href={href}
                    onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                    onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                    style={{ fontSize:13, color:'#111111', textDecoration:'none', transition:'color 0.18s' }}>{label}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    };

    /* ── App ─────────────────────────────────────────────────────── */
    const App = () => (
      <div>
        <Nav />
        <Hero />
        <Pillars />
        <Tracks />
        <Crosslink />
        <OrgCTA />
        <Footer />
      </div>
    );

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
  (function(){
    if(!('IntersectionObserver' in window))return;
    var io=new IntersectionObserver(function(ens){ens.forEach(function(en){if(en.isIntersecting){var el=en.target;el.style.opacity='1';el.style.transform='none';io.unobserve(el);}});},{threshold:0.09,rootMargin:'0px 0px -32px 0px'});
    function boot(){document.querySelectorAll('section,footer').forEach(function(el){var r=el.getBoundingClientRect();if(r.top>=window.innerHeight*0.88){el.style.cssText+=';opacity:0;transform:translateY(26px);transition:opacity 0.7s ease,transform 0.7s ease;';io.observe(el);}});}
    var root=document.getElementById('root');
    if(root&&root.firstChild){boot();}
    else if(root){var mo=new MutationObserver(function(){if(root.firstChild){mo.disconnect();setTimeout(boot,80);}});mo.observe(root,{childList:true});}
  })();
  </script>

  <div id="tweaks-panel" style="display:none; position:fixed; bottom:24px; right:24px; background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius:12px; box-shadow:rgba(0,0,0,0.04) 0 4px 18px; padding:20px; width:220px; z-index:9999; font-family:'Inter',sans-serif;">
    <div style="font-size:13px;font-weight:700;color:rgba(0,0,0,0.85);margin-bottom:14px;">Tweaks</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:11px;font-weight:600;color:#111111;display:block;margin-bottom:6px;">Section padding</label>
        <select onchange="document.querySelectorAll('section').forEach(s=>{s.style.paddingTop=this.value;s.style.paddingBottom=this.value})" style="width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit;">
          <option value="88px">Normal</option>
          <option value="112px">Airy</option>
          <option value="56px">Compact</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:#111111;display:block;margin-bottom:6px;">Track grid</label>
        <select onchange="document.querySelector('.tracks-grid').style.gridTemplateColumns=this.value" style="width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit;">
          <option value="repeat(3,1fr)">3 columns</option>
          <option value="repeat(2,1fr)">2 columns</option>
          <option value="1fr">1 column</option>
        </select>
      </div>
    </div>
  </div>
</body>
</html>
