<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Us, CertiMinds</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #fff; color: rgba(0,0,0,0.95); -webkit-font-smoothing: antialiased; }
    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .nav-inner { padding: 0 16px !important; }
      .nav-logo { height: 48px !important; }
      /* Mission & WhatWeAreNot layouts */
      .mission-layout { grid-template-columns: 1fr !important; gap: 40px !important; }
      .mission-sticky { position: static !important; }
      .mission-img { min-height: 280px !important; height: 280px !important; }
      /* Values */
      .values-grid { grid-template-columns: 1fr 1fr !important; }
      /* Footer CTA buttons */
      .cta-btns { flex-direction: column !important; align-items: stretch !important; }
      .cta-btns a { text-align: center !important; justify-content: center !important; }
      /* Footer */
      .footer-top { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
      .footer-top > div:first-child { grid-column: 1 / -1; }
    }
    @media (max-width: 520px) {
      .values-grid { grid-template-columns: 1fr !important; }
      .footer-top { grid-template-columns: 1fr !important; }
    }
    /* ── Scroll Reveal ─────────────────────────────────────── */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    /* ── Nav ──────────────────────────────────────────────────────── */
    const Nav = () => {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [scrolled, setScrolled] = React.useState(false);

      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 16);
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const links = [
        { label: 'Build Your Team',   href: 'build-your-team.html' },
        { label: 'Build Your Career', href: 'build-your-career.html' },
        { label: 'Our Launchpad',     href: 'our-launchpad.html' },
        { label: 'About Us',          href: 'about-us.html' },
        { label: 'Contact',           href: 'contact.html' },
      ];

      return (
        <header style={{
          position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
          zIndex: 100,
          width: 'calc(100% - 48px)',
          maxWidth: 1200,
          background: 'transparent',
          backdropFilter: 'blur(14px)',
          WebkitBackdropFilter: 'blur(14px)',
          border: '1px solid rgba(255,255,255,0.2)',
          borderRadius: 20,
          boxShadow: scrolled ? '0 8px 36px rgba(0,0,0,0.13)' : '0 2px 18px rgba(0,0,0,0.07)',
          transition: 'box-shadow 0.3s',
          overflow: 'hidden',
        }}>
          <div className="nav-inner" style={{ padding: '0 28px', height: 80, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
            <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0 }}>
              <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" className="nav-logo" style={{ height: 115, transition: 'opacity 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.opacity = '0.75'}
                onMouseLeave={e => e.currentTarget.style.opacity = '1'} />
            </a>
            <div className="nav-links" style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1, justifyContent: 'center' }}>
              {links.map(({ label, href }) => {
                const isActive = window.location.pathname.includes('about-us') && href === 'about-us.html';
                return (
                  <a key={label} href={href} style={{
                    fontSize: 16, fontWeight: isActive ? 600 : 500,
                    color: isActive ? '#0a1628' : '#111111',
                    padding: '8px 16px', textDecoration: 'none', borderRadius: 6,
                    transition: 'color 0.18s', whiteSpace: 'nowrap',
                  }}
                  onMouseEnter={e => e.currentTarget.style.color = '#0a1628'}
                  onMouseLeave={e => e.currentTarget.style.color = isActive ? '#0a1628' : '#111111'}>
                    {label}
                  </a>
                );
              })}
            </div>
            <div className="nav-cta" style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
              <a href="contact.html"
                style={{ display: 'inline-flex', alignItems: 'center', fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', padding: '9px 22px', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', borderRadius: 9999, border: 'none', transition: 'all 0.2s', whiteSpace: 'nowrap', boxShadow: '0 4px 14px rgba(109,40,217,0.3)' }}
                onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(109,40,217,0.45)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.boxShadow = '0 4px 14px rgba(109,40,217,0.3)'; }}>
                Let's Talk
              </a>
            </div>
            <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px' }}
              onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
              {[0,1,2].map(i => (
                <span key={i} style={{ width: 22, height: 2, background: '#0a1628', borderRadius: 2, display: 'block', transition: 'all 0.22s',
                  transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
                  opacity: i===1 && menuOpen ? 0 : 1 }} />
              ))}
            </button>
          </div>
          {menuOpen && (
            <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '12px 24px 20px', display: 'flex', flexDirection: 'column', gap: 2, background: '#ffffff' }}>
              {links.map(({ label, href }) => (
                <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#111111', padding: '11px 12px', borderRadius: 8, textDecoration: 'none', transition: 'background 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(10,22,40,0.05)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>{label}</a>
              ))}
              <a href="contact.html" style={{ textAlign: 'center', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 13.5, fontWeight: 700, padding: '10px 16px', borderRadius: 9999, textDecoration: 'none', marginTop: 10 }}>Let's Talk</a>
            </div>
          )}
        </header>
      );
    };

    /* ── Mission ──────────────────────────────────────────────────── */
    const Mission = () => (
      <section style={{ background: '#fff', padding: '112px 24px 96px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          {/* Badge */}
          <div style={{ marginBottom: 48 }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: '#097fe8', letterSpacing: '1.5px', textTransform: 'uppercase', background: '#eef6ff', padding: '5px 14px', borderRadius: 9999, display: 'inline-block', border: '1px solid rgba(0,117,222,0.15)' }}>About CertiMinds</span>
          </div>

          <div className="mission-layout" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
            {/* Left: headline */}
            <div>
              <h1 style={{ fontSize: 'clamp(2.5rem, 5vw, 3.6rem)', fontWeight: 900, lineHeight: 1.0, letterSpacing: '-2px', marginBottom: 24, background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
                Why CertiMinds Exists
              </h1>
              <div style={{ width: 48, height: 4, borderRadius: 9999, background: 'linear-gradient(90deg, #1560b0, #7c3aed)' }} />
            </div>

            {/* Right: mission text */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              <p style={{ fontSize: '1.1rem', lineHeight: 1.9, color: '#111111', fontWeight: 400 }}>
                Qatar is building something remarkable. The technology talent to support that ambition is not growing fast enough to keep up. CertiMinds exists to change that, by finding driven individuals, developing them through our Launchpad programme, and placing them with the ambitious organisations leading that growth.
              </p>
            </div>
          </div>

          {/* Divider statement */}
          <div style={{ marginTop: 72, paddingTop: 56, borderTop: '1px solid rgba(0,0,0,0.08)' }}>
            <blockquote style={{ fontSize: 'clamp(1.25rem, 2.8vw, 1.75rem)', fontWeight: 700, lineHeight: 1.4, letterSpacing: '-0.5px', color: '#0a1628', maxWidth: 800, fontStyle: 'normal', borderLeft: '4px solid #1560b0', paddingLeft: 28 }}>
              “We are not a recruitment agency or a staffing firm. We are a professional technology consultancy built for the AI era, a capability builder that bridges the gap between aspiration and professional readiness.”
            </blockquote>
          </div>
        </div>
      </section>
    );

    /* ── Values ───────────────────────────────────────────────────── */
    const VALUES = [
      {
        label: 'Excellence',
        color: '#1560b0',
        gradient: 'linear-gradient(135deg, rgba(21,96,176,0.12), rgba(21,96,176,0.06))',
        headline: 'We do not cut corners.',
        body: 'Everything we do is held to a high standard. From the way we select candidates to the way we support organisations.',
        icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
      },
      {
        label: 'Integrity',
        color: '#6d28d9',
        gradient: 'linear-gradient(135deg, rgba(109,40,217,0.12), rgba(109,40,217,0.06))',
        headline: 'Trust is built through transparency.',
        body: 'We are honest with our clients, our consultants and ourselves. If something is not working we say so. If a match is not right we find a better one.',
        icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      },
      {
        label: 'Impact',
        color: '#0075de',
        gradient: 'linear-gradient(135deg, rgba(0,117,222,0.12), rgba(0,117,222,0.06))',
        headline: 'Every placement contributes to something bigger.',
        body: 'We exist to make a real difference to the organisations we serve, to the consultants we develop, and to Qatar\'s growing technology sector.',
        icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
      },
    ];

    const OurValues = () => (
      <section style={{ background: '#f8f9fc', padding: '100px 24px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <div style={{ textAlign: 'center', marginBottom: 64 }}>
            <h2 style={{ fontSize: 'clamp(2rem, 4vw, 2.8rem)', fontWeight: 900, lineHeight: 1.25, letterSpacing: '-1.5px', marginBottom: 16, padding: '8px 0', background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>Our Approach is Guided by Three Values</h2>
            <p style={{ fontSize: '1rem', color: '#111111', maxWidth: 480, margin: '0 auto', lineHeight: 1.7 }}>The principles that shape every decision we make, with candidates, with organisations, and with each other.</p>
          </div>

          <div className="values-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 24 }}>
            {VALUES.map(({ label, color, gradient, headline, body, icon }, idx) => {
              const [hov, setHov] = React.useState(false);
              return (
                <div key={label}
                  onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                  style={{ background: '#fff', border: `1.5px solid ${hov ? color+'50' : 'rgba(0,0,0,0.07)'}`, borderRadius: 20, padding: '40px 36px', transition: 'all 0.25s', display: 'flex', flexDirection: 'column', gap: 20, boxShadow: hov ? `0 12px 40px ${color}18` : '0 2px 12px rgba(0,0,0,0.04)', transform: hov ? 'translateY(-4px)' : 'translateY(0)' }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
                    <div style={{ width: 52, height: 52, borderRadius: 14, background: gradient, display: 'flex', alignItems: 'center', justifyContent: 'center', color, flexShrink: 0 }}>
                      {icon}
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 800, color: 'rgba(0,0,0,0.08)', letterSpacing: '0.5px' }}>0{idx + 1}</span>
                  </div>
                  <div>
                    <div style={{ fontSize: 10.5, fontWeight: 800, color, letterSpacing: '1.5px', textTransform: 'uppercase', marginBottom: 8 }}>{label}</div>
                    <div style={{ fontSize: 17, fontWeight: 800, color: '#0a1628', lineHeight: 1.3, marginBottom: 12, letterSpacing: '-0.3px' }}>{headline}</div>
                    <p style={{ fontSize: 14, lineHeight: 1.85, color: '#111111', margin: 0 }}>{body}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </section>
    );

    /* ── What we're not ───────────────────────────────────────────── */
    const WhatWeAreNot = () => {
      const items = [
        { not: 'A recruitment agency',          because: 'We don\'t search for existing talent or fill roles from a database. We build people from the ground up.' },
        { not: 'A staffing firm',               because: 'Our consultants are developed specifically for their engagements. We\'re not a body shop.' },
        { not: 'A short course or bootcamp',    because: 'The Launchpad runs over months, not weeks. It builds real capability, not surface familiarity.' },
        { not: 'A university or degree programme', because: 'We focus entirely on professional readiness and practical placement. No academic credentials.' },
        { not: 'A placement-only service',      because: 'We remain engaged after placement. Development continues. We don\'t place and disappear.' },
      ];
      const [hovered, setHovered] = React.useState(null);
      return (
        <section style={{ background: '#fff', padding: '100px 24px', position: 'relative', overflow: 'visible' }}>

          <div style={{ maxWidth: 1200, margin: '0 auto', position: 'relative' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 2.3fr', gap: 80, alignItems: 'stretch' }} className="mission-layout">

              {/* Left: text */}
              <div className="mission-sticky" style={{ position: 'sticky', top: 120, zIndex: 20 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: '#097fe8', letterSpacing: '1.5px', textTransform: 'uppercase', background: '#eef6ff', padding: '5px 14px', borderRadius: 9999, display: 'inline-block', marginBottom: 28, border: '1px solid rgba(0,117,222,0.15)' }}>Our positioning</span>
                <h2 style={{ fontSize: 'clamp(2.4rem, 5vw, 3.4rem)', fontWeight: 900, lineHeight: 1.1, letterSpacing: '-1.5px', marginBottom: 24, color: '#0a1628' }}>What CertiMinds is <span style={{ color: '#2E6BCC' }}>Not</span></h2>
                <p style={{ fontSize: '1.05rem', lineHeight: 1.8, color: '#111111', maxWidth: 360 }}>
                  Being clear about what we don't do is as important as explaining what we do. CertiMinds occupies a specific space, and understanding the boundaries helps both candidates and organisations decide whether we're the right fit.
                </p>
                {/* Decorative line */}
                <div style={{ marginTop: 40, width: 48, height: 3, borderRadius: 9999, background: 'linear-gradient(90deg, #1560b0, #7c3aed)' }} />
              </div>

              {/* Right: items, IMAGE REPLACE */}
              <div className="mission-img" style={{ borderRadius: 14, overflow: 'hidden', minHeight: 560, position: 'relative', marginLeft: -160, zIndex: 1 }}>
                <img src="uploads/img.jpg" alt="What we are not" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block', borderRadius: 14 }} />
              </div>

            </div>
          </div>
        </section>
      );
    };


    /* ── Footer CTA ───────────────────────────────────────────────── */
    const FooterCTA = () => (
      <section style={{ background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 100%)', padding: '100px 24px', position: 'relative', overflow: 'hidden' }}>
        {/* Glows */}
        <div style={{ position: 'absolute', top: -100, right: -60, width: 380, height: 380, borderRadius: '50%', background: 'radial-gradient(ellipse, rgba(109,40,217,0.25) 0%, transparent 70%)', pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', bottom: -80, left: -60, width: 300, height: 300, borderRadius: '50%', background: 'radial-gradient(ellipse, rgba(21,96,176,0.3) 0%, transparent 70%)', pointerEvents: 'none' }} />

        <div style={{ maxWidth: 720, margin: '0 auto', textAlign: 'center', position: 'relative' }}>
          <h2 style={{ fontSize: 'clamp(2rem, 4.5vw, 3rem)', fontWeight: 900, lineHeight: 1.25, letterSpacing: '-1.5px', marginBottom: 20, padding: '8px 0', background: 'linear-gradient(135deg, #ffffff 0%, #bfdbfe 60%, #ddd6fe 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
            Ready to work with us?
          </h2>
          <p style={{ fontSize: '1.05rem', lineHeight: 1.75, color: '#ffffff', maxWidth: 460, margin: '0 auto 44px' }}>
            Whether you're an organisation closing a capability gap or a candidate ready to build a career in tech, we'd like to hear from you.
          </p>
          <div className="cta-btns" style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
            <a href="build-your-team.html"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 15, fontWeight: 700, padding: '13px 28px', borderRadius: 9999, textDecoration: 'none', transition: 'all 0.2s', boxShadow: '0 6px 28px rgba(109,40,217,0.4)' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 12px 40px rgba(109,40,217,0.55)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 6px 28px rgba(109,40,217,0.4)'; }}>
              Strengthen your team →
            </a>
            <a href="build-your-career.html"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'transparent', color: '#fff', fontSize: 15, fontWeight: 600, padding: '13px 28px', borderRadius: 9999, textDecoration: 'none', border: '1.5px solid rgba(255,255,255,0.28)', transition: 'all 0.2s' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.08)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.55)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.28)'; }}>
              Launch my career
            </a>
          </div>
        </div>
      </section>
    );

    /* ── Footer ───────────────────────────────────────────────────── */
    const Footer = () => {
      const navCols = [
        { heading: 'Services', links: [{ label:'Build Your Team', href:'build-your-team.html' }, { label:'Build Your Career', href:'build-your-career.html' }, { label:'Our Launchpad', href:'our-launchpad.html' }] },
        { heading: 'Company',  links: [{ label:'About Us', href:'about-us.html' }, { label:'Insights', href:'#' }, { label:'Contact', href:'contact.html' }] },
      ];
      const linkStyle = { fontSize:18, color:'#111111', textDecoration:'none', transition:'color 0.18s', display:'inline-block' };
      return (
        <footer style={{ background:'#fff', borderTop:'1px solid rgba(0,0,0,0.08)', padding:'72px 24px 0' }}>
          <div style={{ maxWidth:1200, margin:'0 auto' }}>
            <div className="footer-top" style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:48, paddingBottom:56, borderBottom:'1px solid rgba(0,0,0,0.08)' }}>
              <div>
                <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 115, marginBottom:20 }} />
                <p style={{ fontSize:18, color:'#111111', lineHeight:1.8, maxWidth:280, marginBottom:28 }}>
                  Developing the next generation of tech professionals in Qatar.
                </p>
                <div style={{ display:'flex', gap:10 }}>
                  {[
                    { href:'https://linkedin.com', title:'LinkedIn', svg:<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg> },
                  ].map(({ href, title, svg }) => (
                    <a key={title} href={href} target="_blank" rel="noopener noreferrer" title={title}
                      onMouseEnter={e=>{ e.currentTarget.style.background='rgba(11,17,32,0.07)'; e.currentTarget.style.color='#0b1120'; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background='rgba(0,0,0,0.04)'; e.currentTarget.style.color='#111111'; }}
                      style={{ width:38, height:38, borderRadius:'50%', background:'rgba(0,0,0,0.04)', border:'1px solid rgba(0,0,0,0.08)', display:'flex', alignItems:'center', justifyContent:'center', color:'#111111', textDecoration:'none', transition:'background 0.18s, color 0.18s' }}>
                      {svg}
                    </a>
                  ))}
                </div>
              </div>
              {navCols.map(col => (
                <div key={col.heading}>
                  <div style={{ fontSize:14, fontWeight:700, color:'#111111', letterSpacing:'2px', textTransform:'uppercase', marginBottom:20 }}>{col.heading}</div>
                  <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                    {col.links.map(({ label, href }) => (
                      <a key={label} href={href}
                        onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                        onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                        style={linkStyle}>{label}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:16, padding:'22px 0 26px' }}>
              <span style={{ fontSize:17, color:'#111111' }}>© CertiMinds 2026. All rights reserved.</span>
              <div style={{ display:'flex', gap:24 }}>
                {[{ label:'Privacy Policy', href:'privacy-policy.html' }, { label:'Terms of Use', href:'terms-of-use.html' }].map(({ label, href }) => (
                  <a key={label} href={href}
                    onMouseEnter={e=>e.currentTarget.style.color='#0b1120'}
                    onMouseLeave={e=>e.currentTarget.style.color='#111111'}
                    style={{ fontSize:17, color:'#111111', textDecoration:'none', transition:'color 0.18s' }}>{label}</a>
                ))}
              </div>
            </div>
          </div>
        </footer>
      );
    };

    /* ── App ─────────────────────────────────────────────────────── */
    const App = () => (
      <div>
        <Nav />
        <Mission />
        <OurValues />
        <WhatWeAreNot />
        <FooterCTA />
        <Footer />
      </div>
    );

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
  (function(){
    if(!('IntersectionObserver' in window))return;
    var io=new IntersectionObserver(function(ens){ens.forEach(function(en){if(en.isIntersecting){var el=en.target;el.style.opacity='1';el.style.transform='none';io.unobserve(el);}});},{threshold:0.09,rootMargin:'0px 0px -32px 0px'});
    function boot(){document.querySelectorAll('section,footer').forEach(function(el){var r=el.getBoundingClientRect();if(r.top>=window.innerHeight*0.88){el.style.cssText+=';opacity:0;transform:translateY(26px);transition:opacity 0.7s ease,transform 0.7s ease;';io.observe(el);}});}
    var root=document.getElementById('root');
    if(root&&root.firstChild){boot();}
    else if(root){var mo=new MutationObserver(function(){if(root.firstChild){mo.disconnect();setTimeout(boot,80);}});mo.observe(root,{childList:true});}
  })();
  </script>

  <div id="tweaks-panel" style="display:none; position:fixed; bottom:24px; right:24px; background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius:12px; box-shadow:rgba(0,0,0,0.04) 0 4px 18px; padding:20px; width:220px; z-index:9999; font-family:'Inter',sans-serif;">
    <div style="font-size:13px;font-weight:700;color:rgba(0,0,0,0.85);margin-bottom:14px;">Tweaks</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:11px;font-weight:600;color:#111111;display:block;margin-bottom:6px;">Section padding</label>
        <select onchange="document.querySelectorAll('section').forEach(s=>{s.style.paddingTop=this.value;s.style.paddingBottom=this.value})" style="width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit;">
          <option value="88px">Normal</option>
          <option value="112px">Airy</option>
          <option value="56px">Compact</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:#111111;display:block;margin-bottom:6px;">Values layout</label>
        <select onchange="document.querySelector('.values-grid').style.gridTemplateColumns=this.value" style="width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit;">
          <option value="1fr 1fr 1fr">3 columns</option>
          <option value="1fr">Stacked</option>
        </select>
      </div>
    </div>
  </div>
</body>
</html>
