<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertiMinds — Tech Talent Development, Qatar</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #0b1120; color: rgba(0,0,0,0.95); -webkit-font-smoothing: antialiased; }

    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .how-grid { grid-template-columns: 1fr !important; }
      .adv-grid { grid-template-columns: 1fr 1fr !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 520px) {
      .adv-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr !important; }
      .hero-ctas { flex-direction: column !important; align-items: stretch !important; }
      .hero-ctas a { text-align: center; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    /* ── Nav ──────────────────────────────────────────────────────── */
    const Nav = () => {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [scrolled, setScrolled] = React.useState(false);
      React.useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 16);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = [
        { label: 'Build Your Team',   href: 'build-your-team.html' },
        { label: 'Build Your Career', href: '#' },
        { label: 'Our Launchpad',     href: 'our-launchpad.html' },
        { label: 'About Us',          href: 'about-us.html' },
        { label: 'Contact',           href: 'contact.html' },
      ];

      return (
        <div style={{ position: 'sticky', top: 0, zIndex: 100, display: 'flex', justifyContent: 'center', padding: scrolled ? '8px 32px' : '14px 32px', transition: 'padding 0.3s ease', background: 'transparent', pointerEvents: 'none' }}>
          <nav style={{
            pointerEvents: 'all',
            width: '100%', maxWidth: 1060,
            background: '#ffffff',
            borderRadius: 999,
            boxShadow: scrolled
              ? '0 8px 32px rgba(0,0,0,0.11), 0 2px 8px rgba(0,0,0,0.06)'
              : '0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04)',
            transition: 'box-shadow 0.3s ease',
          }}>
            <div style={{ padding: '8px 8px 8px 20px', height: 62, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>

              {/* Logo */}
              <a href="index (2).html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0, marginRight: 8 }}>
                <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 40, transition: 'opacity 0.2s' }}
                  onMouseEnter={e => e.currentTarget.style.opacity = '0.8'}
                  onMouseLeave={e => e.currentTarget.style.opacity = '1'} />
              </a>

              {/* Nav links */}
              <div className="nav-links" style={{ display: 'flex', alignItems: 'center', gap: 2, flex: 1, justifyContent: 'center' }}>
                {links.map(({ label, href }) => {
                  const isActive = href !== '#' && currentPage === href;
                  return (
                    <NavPill key={label} href={href} label={label} active={isActive} />
                  );
                })}
              </div>

              {/* CTA */}
              <div className="nav-cta" style={{ flexShrink: 0 }}>
                <a href="contact.html"
                  style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', padding: '10px 22px', background: '#0b1120', borderRadius: 999, transition: 'all 0.2s', whiteSpace: 'nowrap', letterSpacing: '-0.1px' }}
                  onMouseEnter={e => { e.currentTarget.style.background = '#1b2d50'; e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = '#0b1120'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
                  Let's Talk <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)' }}>→</span>
                </a>
              </div>

              {/* Hamburger */}
              <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'rgba(11,17,32,0.06)', border: 'none', borderRadius: 999, cursor: 'pointer', padding: '10px 12px' }}
                onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
                {[0,1,2].map(i => (
                  <span key={i} style={{ width: 20, height: 2, background: '#0b1120', borderRadius: 2, display: 'block', transition: 'all 0.22s',
                    transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
                    opacity: i===1 && menuOpen ? 0 : 1 }} />
                ))}
              </button>
            </div>

            {/* Mobile menu */}
            {menuOpen && (
              <div style={{ borderTop: '1px solid rgba(0,0,0,0.06)', padding: '10px 16px 16px', display: 'flex', flexDirection: 'column', gap: 2, borderRadius: '0 0 28px 28px' }}>
                {links.map(({ label, href }) => (
                  <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#374151', padding: '10px 14px', borderRadius: 12, textDecoration: 'none', transition: 'background 0.15s' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(11,17,32,0.05)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>{label}</a>
                ))}
                <a href="contact.html" style={{ marginTop: 8, textAlign: 'center', background: '#0b1120', color: '#fff', fontSize: 14, fontWeight: 700, padding: '11px 16px', borderRadius: 999, textDecoration: 'none' }}>Let's Talk ↗</a>
              </div>
            )}
          </nav>
        </div>
      );
    };

    const NavPill = ({ href, label, active }) => {
      const [hov, setHov] = React.useState(false);
      return (
        <a href={href}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            fontSize: 13.5,
            fontWeight: active ? 700 : hov ? 600 : 500,
            color: active ? '#0b1120' : hov ? '#fff' : '#6b7280',
            padding: '8px 16px',
            textDecoration: 'none',
            borderRadius: 999,
            background: active ? 'rgba(90,163,216,0.14)' : hov ? '#0b1120' : 'transparent',
            border: active ? '1px solid rgba(90,163,216,0.3)' : '1px solid transparent',
            transition: 'all 0.2s ease',
            whiteSpace: 'nowrap',
          }}>
          {label}
        </a>
      );
    };

    /* ── Hero ─────────────────────────────────────────────────────── */
    const Hero = () => {
      return (
      <section style={{ background: '#0b1120', minHeight: 'calc(100vh - 90px)', display: 'flex', alignItems: 'center', padding: '60px 24px 56px', position: 'relative', overflow: 'hidden' }}>

        {/* Grid texture overlay */}
        <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(90,163,216,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(90,163,216,0.04) 1px, transparent 1px)', backgroundSize: '48px 48px', pointerEvents: 'none' }} />
        {/* Blue glow top-right */}
        <div style={{ position: 'absolute', top: -100, right: -60, width: 480, height: 480, borderRadius: '50%', background: 'radial-gradient(circle, rgba(45,111,170,0.28) 0%, transparent 65%)', pointerEvents: 'none' }} />
        {/* Subtle glow bottom-left */}
        <div style={{ position: 'absolute', bottom: -60, left: -40, width: 320, height: 320, borderRadius: '50%', background: 'radial-gradient(circle, rgba(90,163,216,0.12) 0%, transparent 70%)', pointerEvents: 'none' }} />

        <div style={{ maxWidth: 780, margin: '0 auto', position: 'relative', zIndex: 1, textAlign: 'center', width: '100%' }}>

          {/* Top badge */}
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, background: 'rgba(90,163,216,0.12)', border: '1px solid rgba(90,163,216,0.25)', borderRadius: 100, padding: '5px 14px', marginBottom: 28 }}>
            <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#5aa3d8', display: 'inline-block' }} />
            <span style={{ fontSize: 11.5, fontWeight: 600, color: '#8ec6e8', letterSpacing: '0.4px' }}>Tech Talent Development · Qatar &amp; Gulf</span>
          </div>

          {/* H1 with gradient */}
          <h1 style={{ fontSize: 'clamp(1.6rem, 3.6vw, 2.9rem)', fontWeight: 900, lineHeight: 1.08, letterSpacing: '-1.5px', marginBottom: 20, fontFeatureSettings: '"lnum"' }}>
            <span style={{ background: 'linear-gradient(135deg, #ffffff 0%, #8ec6e8 50%, #5aa3d8 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
              Tech Specialists Your Organization
            </span>
            <br />
            <span style={{ background: 'linear-gradient(135deg, #5aa3d8 0%, #2d6faa 50%, #8ec6e8 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
              Needs.
            </span>{' '}
            <span style={{ background: 'linear-gradient(135deg, #ffffff 0%, #c8e4f5 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
              Built Exclusively{' '}
            </span>
            <span style={{ position: 'relative', display: 'inline-block' }}>
              <span style={{ background: 'linear-gradient(135deg, #ffffff 0%, #c8e4f5 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>for You</span>
              <svg style={{ position: 'absolute', bottom: -8, left: 0, width: '100%', height: 10, overflow: 'visible' }} viewBox="0 0 100 10" preserveAspectRatio="none">
                <path d="M0 8 Q25 2 50 6 Q75 10 100 4" stroke="url(#ug)" strokeWidth="2.5" fill="none" strokeLinecap="round" opacity="0.85"/>
                <defs>
                  <linearGradient id="ug" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#8ec6e8"/>
                    <stop offset="100%" stopColor="#5aa3d8"/>
                  </linearGradient>
                </defs>
              </svg>
            </span>
          </h1>

          {/* Subheadline */}
          <p style={{ fontSize: 'clamp(0.875rem, 1.4vw, 1rem)', lineHeight: 1.7, color: 'rgba(255,255,255,0.48)', marginBottom: 36, maxWidth: 560, margin: '0 auto 36px' }}>
            We don't search the market for the right fit. We build it. CertiMinds Launchpad develops technology
            professionals built around your exact requirements — assessed, ready and placed with you from day one.
          </p>

          {/* CTAs */}
          <div className="hero-ctas" style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
            <a href="build-your-team.html"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#fff', color: '#0b1120', fontSize: 14, fontWeight: 700, padding: '12px 24px', borderRadius: 10, textDecoration: 'none', transition: 'all 0.2s', letterSpacing: '-0.1px' }}
              onMouseEnter={e => { e.currentTarget.style.background = '#eaf4ff'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 10px 28px rgba(0,0,0,0.22)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = '#fff'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'none'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
              Strengthen Your Team <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)' }}>→</span>
            </a>
            <a href="#"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'rgba(255,255,255,0.07)', color: '#fff', fontSize: 14, fontWeight: 600, padding: '12px 24px', borderRadius: 10, textDecoration: 'none', border: '1px solid rgba(255,255,255,0.14)', transition: 'all 0.2s', letterSpacing: '-0.1px' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.13)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.07)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
              Launch My Career <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)' }}>→</span>
            </a>
          </div>

          {/* Stats row */}
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 48, borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 32, gap: 0 }}>
            {[
              { value: '200+', label: 'Professionals Placed' },
              { value: '6 mo', label: 'Avg. Launchpad Time' },
              { value: '95%',  label: 'Client Retention' },
              { value: 'Day 1', label: 'Ready to Deploy' },
            ].map(({ value, label }, i, arr) => (
              <div key={value} style={{ flex: 1, textAlign: 'center', padding: '0 16px', borderRight: i < arr.length - 1 ? '1px solid rgba(255,255,255,0.08)' : 'none' }}>
                <div style={{ fontSize: 'clamp(1.4rem, 2.4vw, 2rem)', fontWeight: 900, letterSpacing: '-1px', lineHeight: 1, background: 'linear-gradient(135deg, #fff 30%, #8ec6e8 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>{value}</div>
                <div style={{ fontSize: 11, fontWeight: 500, color: 'rgba(255,255,255,0.32)', marginTop: 4 }}>{label}</div>
              </div>
            ))}
          </div>

        </div>
      </section>
      );
    };

    /* ── Audience Cards ────────────────────────────────────────────── */
    const AudienceSection = () => {
      const [hovA, setHovA] = React.useState(false);
      const [hovB, setHovB] = React.useState(false);
      return (
        <section style={{ background: '#f4f7fb', padding: '96px 24px' }}>
          <div style={{ maxWidth: 1100, margin: '0 auto' }}>

            {/* Section label */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 56, justifyContent: 'center' }}>
              <span style={{ width: 28, height: 1, background: '#2d6faa', display: 'inline-block' }} />
              <span style={{ fontSize: 11.5, fontWeight: 700, color: '#2d6faa', letterSpacing: '1.5px', textTransform: 'uppercase' }}>Who We Work With</span>
              <span style={{ width: 28, height: 1, background: '#2d6faa', display: 'inline-block' }} />
            </div>

            {/* Two cards side by side */}
            <div className="hero-ctas" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>

              {/* Card 1 — Organisations */}
              <div onMouseEnter={() => setHovA(true)} onMouseLeave={() => setHovA(false)}
                style={{ position: 'relative', borderRadius: 24, overflow: 'hidden', background: '#0b1120', transition: 'all 0.3s ease', cursor: 'default', minHeight: 380, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '40px 40px 36px', boxShadow: hovA ? '0 32px 80px rgba(11,17,32,0.3)' : '0 8px 32px rgba(11,17,32,0.15)' }}>
                {/* Glow */}
                <div style={{ position: 'absolute', top: -60, right: -60, width: 260, height: 260, borderRadius: '50%', background: 'radial-gradient(circle, rgba(90,163,216,0.18) 0%, transparent 70%)', pointerEvents: 'none', transition: 'opacity 0.3s', opacity: hovA ? 1 : 0.5 }} />
                {/* Number */}
                <div style={{ position: 'absolute', bottom: 20, right: 28, fontSize: 96, fontWeight: 900, color: 'rgba(255,255,255,0.04)', lineHeight: 1, letterSpacing: '-4px', userSelect: 'none' }}>01</div>

                <div style={{ position: 'relative', zIndex: 1 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: 'rgba(90,163,216,0.15)', border: '1px solid rgba(90,163,216,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#5aa3d8', marginBottom: 28 }}>
                    <BuildingIcon />
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: '#5aa3d8', letterSpacing: '1.5px', textTransform: 'uppercase', display: 'block', marginBottom: 14 }}>For organisations</span>
                  <h3 style={{ fontSize: 'clamp(1.4rem, 2vw, 1.9rem)', fontWeight: 800, lineHeight: 1.2, letterSpacing: '-0.5px', color: '#fff', marginBottom: 16 }}>Strengthen<br />Your Team</h3>
                  <p style={{ fontSize: 14.5, lineHeight: 1.75, color: 'rgba(255,255,255,0.5)', maxWidth: 320 }}>We don't hand you a CV. We place a professional built specifically around your technology requirements — assessed, trained, and ready from day one.</p>
                </div>

                <a href="build-your-team.html" style={{ position: 'relative', zIndex: 1, display: 'inline-flex', alignItems: 'center', gap: 10, marginTop: 32, fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', background: 'rgba(90,163,216,0.15)', border: '1px solid rgba(90,163,216,0.3)', borderRadius: 999, padding: '10px 20px', width: 'fit-content', transition: 'all 0.2s' }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(90,163,216,0.28)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(90,163,216,0.15)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
                  Build Your Team <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)', fontSize: 15 }}>→</span>
                </a>
              </div>

              {/* Card 2 — Candidates */}
              <div onMouseEnter={() => setHovB(true)} onMouseLeave={() => setHovB(false)}
                style={{ position: 'relative', borderRadius: 24, overflow: 'hidden', background: '#fff', transition: 'all 0.3s ease', cursor: 'default', minHeight: 380, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '40px 40px 36px', border: '1px solid rgba(45,111,170,0.12)', boxShadow: hovB ? '0 32px 80px rgba(45,111,170,0.14)' : '0 4px 24px rgba(0,0,0,0.06)' }}>
                {/* Glow */}
                <div style={{ position: 'absolute', bottom: -60, left: -60, width: 260, height: 260, borderRadius: '50%', background: 'radial-gradient(circle, rgba(45,111,170,0.1) 0%, transparent 70%)', pointerEvents: 'none', transition: 'opacity 0.3s', opacity: hovB ? 1 : 0.4 }} />
                {/* Number */}
                <div style={{ position: 'absolute', bottom: 20, right: 28, fontSize: 96, fontWeight: 900, color: 'rgba(11,17,32,0.04)', lineHeight: 1, letterSpacing: '-4px', userSelect: 'none' }}>02</div>

                <div style={{ position: 'relative', zIndex: 1 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: 'rgba(45,111,170,0.08)', border: '1px solid rgba(45,111,170,0.18)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#2d6faa', marginBottom: 28 }}>
                    <PersonIcon />
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: '#2d6faa', letterSpacing: '1.5px', textTransform: 'uppercase', display: 'block', marginBottom: 14 }}>For candidates</span>
                  <h3 style={{ fontSize: 'clamp(1.4rem, 2vw, 1.9rem)', fontWeight: 800, lineHeight: 1.2, letterSpacing: '-0.5px', color: '#0b1120', marginBottom: 16 }}>Launch<br />Your Career</h3>
                  <p style={{ fontSize: 14.5, lineHeight: 1.75, color: '#6b7280', maxWidth: 320 }}>Enter the CertiMinds Launchpad. Six months of structured development designed around what employers actually need — and end with a confirmed placement.</p>
                </div>

                <a href="#" style={{ position: 'relative', zIndex: 1, display: 'inline-flex', alignItems: 'center', gap: 10, marginTop: 32, fontSize: 13.5, fontWeight: 700, color: '#2d6faa', textDecoration: 'none', background: 'rgba(45,111,170,0.08)', border: '1px solid rgba(45,111,170,0.2)', borderRadius: 999, padding: '10px 20px', width: 'fit-content', transition: 'all 0.2s' }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(45,111,170,0.16)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(45,111,170,0.08)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
                  Launch My Career <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)', fontSize: 15 }}>→</span>
                </a>
              </div>

            </div>
          </div>
        </section>
      );
    };

    /* ── How It Works — Stacking Cards ───────────────────────────── */
    const howCards = [
      {
        step: '01', label: 'Select',
        title: 'We Identify The Right People',
        desc: 'We identify elite talent locally based in Qatar with strong technological foundations, assessed on capability and potential, not qualifications alone.',
        img: 'https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=900&auto=format&fit=crop&q=80',
        color: '#1b2d50',
      },
      {
        step: '02', label: 'Develop',
        title: 'We Build Them For You',
        desc: 'Selected candidates enter our Launchpad programme — a structured period of technical and professional development built around the capability your organization actually needs.',
        img: 'https://images.unsplash.com/photo-1531482615713-2afd69097998?w=900&auto=format&fit=crop&q=80',
        color: '#163758',
      },
      {
        step: '03', label: 'Place',
        title: 'Placed. Assessed. Day One Ready.',
        desc: 'Developed professionals are placed with your organization on flexible monthly engagements through a direct contract. No hidden fees. No additional costs.',
        img: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=900&auto=format&fit=crop&q=80',
        color: '#0f2744',
      },
    ];

    const HowCard = React.memo(({ i, step, label, title, desc, img, color, total, sectionRef }) => {
      const containerRef = React.useRef(null);
      const innerRef    = React.useRef(null);
      const imgRef      = React.useRef(null);

      React.useEffect(() => {
        let raf;
        const update = () => {
          if (!containerRef.current || !sectionRef.current || !innerRef.current || !imgRef.current) return;

          /* ── image zoom: 1.4 → 1 as card enters viewport ── */
          const rect = containerRef.current.getBoundingClientRect();
          const imgP = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / (window.innerHeight + rect.height)));
          imgRef.current.style.transform = `scale(${1.4 - 0.4 * imgP})`;

          /* ── card scale-down based on section scroll progress ── */
          const secRect      = sectionRef.current.getBoundingClientRect();
          const secScrollable = Math.max(1, sectionRef.current.scrollHeight - window.innerHeight);
          const secP         = Math.max(0, Math.min(1, -secRect.top / secScrollable));
          const targetScale  = 1 - (total - i) * 0.05;
          const start        = i / total;
          const progress     = Math.max(0, Math.min(1, (secP - start) / (1 - start)));
          innerRef.current.style.transform = `scale(${1 - (1 - targetScale) * progress})`;
        };

        const onScroll = () => { cancelAnimationFrame(raf); raf = requestAnimationFrame(update); };
        window.addEventListener('scroll', onScroll, { passive: true });
        update();
        return () => { window.removeEventListener('scroll', onScroll); cancelAnimationFrame(raf); };
      }, [i, total]);

        <div ref={containerRef} style={{ height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'sticky', top: 0, zIndex: i + 1 }}>

        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    );

    /* ── App ─────────────────────────────────────────────────────── */
    const App = () => (
      <div>
        <Nav />
        <Hero />
        <AudienceSection />
        <HowItWorks />
        <Advantage />
        <FooterCTA />
        <Footer />
      </div>
    );

    /* ── Tweaks ──────────────────────────────────────────────────── */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#0075de",
      "heroHeadline": "The talent gap is real. We close it.",
      "sectionPad": "normal"
    }/*EDITMODE-END*/;

    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <!-- Tweaks panel -->
  <div id="tweaks-panel" style="display:none; position:fixed; bottom:24px; right:24px; background:#fff; border:1px solid rgba(0,0,0,0.12); border-radius:12px; box-shadow:rgba(0,0,0,0.04) 0 4px 18px, rgba(0,0,0,0.03) 0 2px 8px; padding:20px; width:228px; z-index:9999; font-family:'Inter',sans-serif;">
    <div style="font-size:13px;font-weight:700;color:rgba(0,0,0,0.85);margin-bottom:16px;">Tweaks</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:11px;font-weight:600;color:#615d59;display:block;margin-bottom:6px;">Section padding</label>
        <select onchange="setPad(this.value)" style="width:100%;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:5px 8px;font-size:13px;font-family:inherit;color:rgba(0,0,0,0.8);">
          <option value="normal">Normal</option>
          <option value="airy">Airy</option>
          <option value="compact">Compact</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:#615d59;display:block;margin-bottom:6px;">CTA emphasis</label>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <button onclick="setCtaStyle('split')" style="text-align:left;background:none;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:6px 10px;font-size:12px;font-family:inherit;cursor:pointer;color:rgba(0,0,0,0.7);">Split audience cards</button>
          <button onclick="setCtaStyle('single')" style="text-align:left;background:none;border:1px solid rgba(0,0,0,0.15);border-radius:4px;padding:6px 10px;font-size:12px;font-family:inherit;cursor:pointer;color:rgba(0,0,0,0.7);">Single primary CTA</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setPad(val) {
      const pads = { normal: '88px', airy: '112px', compact: '56px' };
      document.querySelectorAll('section').forEach(s => { s.style.paddingTop = pads[val]; s.style.paddingBottom = pads[val]; });
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { sectionPad: val } }, '*');
    }
    function setCtaStyle(val) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { ctaStyle: val } }, '*');
    }
  </script>
</body>
</html>
