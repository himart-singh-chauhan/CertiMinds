<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertiMinds — Tech Talent Development, Qatar</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 118%; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #ffffff; color: rgba(0,0,0,0.9); -webkit-font-smoothing: antialiased; }

    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .how-grid { grid-template-columns: 1fr !important; }
      .adv-grid { grid-template-columns: 1fr 1fr !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 520px) {
      .adv-grid { grid-template-columns: 1fr !important; }
      .footer-grid { grid-template-columns: 1fr !important; }
      .hero-ctas { flex-direction: column !important; align-items: stretch !important; }
      .hero-ctas a { text-align: center; justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    /* ── Nav ──────────────────────────────────────────────────────── */
    const Nav = () => {
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [scrolled, setScrolled] = React.useState(false);
      const [hidden, setHidden] = React.useState(false);
      const lastY = React.useRef(0);

      React.useEffect(() => {
        const fn = () => {
          const y = window.scrollY;
          setScrolled(y > 16);
          if (y > lastY.current && y > 80) {
            setHidden(true);   // scrolling down → hide
          } else {
            setHidden(false);  // scrolling up → show
          }
          lastY.current = y;
        };
        window.addEventListener('scroll', fn, { passive: true });
        return () => window.removeEventListener('scroll', fn);
      }, []);

      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = [
        { label: 'Build Your Team',   href: 'build-your-team.html' },
        { label: 'Build Your Career', href: '#' },
        { label: 'Our Launchpad',     href: 'our-launchpad.html' },
        { label: 'About Us',          href: 'about-us.html' },
        { label: 'Contact',           href: 'contact.html' },
      ];

      return (
        <header style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: '#ffffff',
          borderBottom: scrolled ? '1px solid rgba(0,0,0,0.08)' : '1px solid transparent',
          boxShadow: scrolled ? '0 2px 16px rgba(0,0,0,0.06)' : 'none',
          transform: hidden ? 'translateY(-100%)' : 'translateY(0)',
          transition: 'transform 0.35s cubic-bezier(0.4,0,0.2,1), border-color 0.3s, box-shadow 0.3s',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>

            {/* Logo */}
            <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0 }}>
              <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 38, transition: 'opacity 0.2s' }}
                onMouseEnter={e => e.currentTarget.style.opacity = '0.75'}
                onMouseLeave={e => e.currentTarget.style.opacity = '1'} />
            </a>

            {/* Nav links */}
            <div className="nav-links" style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1, justifyContent: 'center' }}>
              {links.map(({ label, href }) => {
                const isActive = href !== '#' && currentPage === href;
                return <NavPill key={label} href={href} label={label} active={isActive} />;
              })}
            </div>

            {/* CTA buttons */}
            <div className="nav-cta" style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
              <a href="contact.html"
                style={{ display: 'inline-flex', alignItems: 'center', fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', padding: '9px 22px', background: '#0a1628', borderRadius: 9999, border: '1.5px solid #0a1628', transition: 'all 0.2s', whiteSpace: 'nowrap' }}
                onMouseEnter={e => { e.currentTarget.style.background = '#1560b0'; e.currentTarget.style.borderColor = '#1560b0'; }}
                onMouseLeave={e => { e.currentTarget.style.background = '#0a1628'; e.currentTarget.style.borderColor = '#0a1628'; }}>
                Let's Talk
              </a>
            </div>

            {/* Hamburger */}
            <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px' }}
              onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
              {[0,1,2].map(i => (
                <span key={i} style={{ width: 22, height: 2, background: '#0a1628', borderRadius: 2, display: 'block', transition: 'all 0.22s',
                  transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
                  opacity: i===1 && menuOpen ? 0 : 1 }} />
              ))}
            </button>
          </div>

          {/* Mobile menu */}
          {menuOpen && (
            <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '12px 24px 20px', display: 'flex', flexDirection: 'column', gap: 2, background: '#ffffff' }}>
              {links.map(({ label, href }) => (
                <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#374151', padding: '11px 12px', borderRadius: 8, textDecoration: 'none', transition: 'background 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(10,22,40,0.05)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>{label}</a>
              ))}
              <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
                <a href="contact.html" style={{ flex: 1, textAlign: 'center', background: '#0a1628', color: '#fff', fontSize: 13.5, fontWeight: 700, padding: '10px 16px', borderRadius: 9999, textDecoration: 'none' }}>Let's Talk</a>
              </div>
            </div>
          )}
        </header>
      );
    };

    const NavPill = ({ href, label, active }) => {
      const [hov, setHov] = React.useState(false);
      return (
        <a href={href}
          onMouseEnter={() => setHov(true)}
          onMouseLeave={() => setHov(false)}
          style={{
            fontSize: 13.5,
            fontWeight: active ? 600 : 500,
            color: active ? '#0a1628' : hov ? '#0a1628' : '#6b7280',
            padding: '8px 16px',
            textDecoration: 'none',
            borderRadius: 6,
            background: 'transparent',
            border: 'none',
            transition: 'color 0.18s ease',
            whiteSpace: 'nowrap',
          }}>
          {label}
        </a>
      );
    };

    /* ── Hero ─────────────────────────────────────────────────────── */
    const HeroTyped = () => {
      const words = ['Engineers', 'Developers', 'Data Analysts', 'Cloud Architects', 'DevOps Talent'];
      const [wordIdx, setWordIdx] = React.useState(0);
      const [displayed, setDisplayed] = React.useState('');
      const [deleting, setDeleting] = React.useState(false);
      const [paused, setPaused] = React.useState(false);

      React.useEffect(() => {
        const target = words[wordIdx];
        if (paused) {
          const t = setTimeout(() => { setPaused(false); setDeleting(true); }, 1800);
          return () => clearTimeout(t);
        }
        if (!deleting && displayed.length < target.length) {
          const t = setTimeout(() => setDisplayed(target.slice(0, displayed.length + 1)), 72);
          return () => clearTimeout(t);
        }
        if (!deleting && displayed.length === target.length) {
          setPaused(true);
          return;
        }
        if (deleting && displayed.length > 0) {
          const t = setTimeout(() => setDisplayed(displayed.slice(0, -1)), 40);
          return () => clearTimeout(t);
        }
        if (deleting && displayed.length === 0) {
          setDeleting(false);
          setWordIdx((wordIdx + 1) % words.length);
        }
      }, [displayed, deleting, paused, wordIdx]);

      return (
        <span style={{ color: '#1560b0', borderRight: '2px solid #1560b0', paddingRight: 2, animation: 'blink 0.9s step-end infinite' }}>
          {displayed}
          <style>{`@keyframes blink { 0%,100%{border-color:#1560b0} 50%{border-color:transparent} }`}</style>
        </span>
      );
    };

    /* ── Hero Visual (right panel) ───────────────────────────────── */
    const HeroVisual = () => {
      const [count, setCount] = React.useState(0);
      React.useEffect(() => {
        const target = 47;
        let current = 0;
        const timer = setInterval(() => {
          current += 2;
          if (current >= target) { setCount(target); clearInterval(timer); }
          else setCount(current);
        }, 35);
        return () => clearInterval(timer);
      }, []);

      const placements = [
        { role: 'Cloud Architect',    company: 'Energy Sector',  days: 18, tag: 'Azure',  color: '#06b6d4' },
        { role: 'Full-Stack Dev',     company: 'FinTech Firm',   days: 22, tag: 'React',  color: '#3b82f6' },
        { role: 'Data Engineer',      company: 'Gov. Agency',    days: 15, tag: 'Python', color: '#8b5cf6' },
      ];

      const pills = [
        { label: 'React',      color: '#3b82f6', top: '4%',   left: '-6%',  delay: '0s'   },
        { label: 'AWS',        color: '#f59e0b', top: '20%',  right: '-8%', delay: '0.4s' },
        { label: 'Python',     color: '#8b5cf6', bottom: '28%', right: '-10%', delay: '0.8s' },
        { label: 'Kubernetes', color: '#06b6d4', bottom: '10%', left: '-8%', delay: '0.6s' },
        { label: 'Azure',      color: '#1560b0', top: '55%',  left: '-12%', delay: '1.1s' },
      ];

      return (
        <div style={{ position: 'relative', height: 460, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <style>{`@keyframes floatUD { from{transform:translateY(0)} to{transform:translateY(-9px)} }`}</style>

          {/* Main card */}
          <div style={{ width: '78%', background: '#ffffff', borderRadius: 22, border: '1px solid rgba(0,0,0,0.09)', boxShadow: '0 24px 64px rgba(10,22,40,0.1), 0 4px 16px rgba(0,0,0,0.05)', padding: '26px 26px 22px', position: 'relative', zIndex: 2 }}>

            {/* Header */}
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 18 }}>
              <div>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: '#1560b0', letterSpacing: '1.5px', textTransform: 'uppercase', marginBottom: 3 }}>Q2 2026 · Live Cohort</div>
                <div style={{ fontSize: 15, fontWeight: 800, color: '#0a1628', letterSpacing: '-0.3px' }}>Engineers Deployed</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 38, fontWeight: 900, color: '#0a1628', letterSpacing: '-2px', lineHeight: 1 }}>{count}</div>
                <div style={{ fontSize: 11, color: '#10b981', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 3, justifyContent: 'flex-end', marginTop: 3 }}>
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="#10b981"><path d="M5 1l4 4H6v4H4V5H1z"/></svg>
                  23% this quarter
                </div>
              </div>
            </div>

            {/* Divider */}
            <div style={{ height: 1, background: 'rgba(0,0,0,0.06)', marginBottom: 14 }} />

            {/* Recent placements label */}
            <div style={{ fontSize: 10.5, fontWeight: 700, color: '#9ca3af', letterSpacing: '1px', textTransform: 'uppercase', marginBottom: 9 }}>Recent Placements</div>

            {/* Placement rows */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
              {placements.map(({ role, company, days, tag, color }) => (
                <div key={role} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: '#f8faff', borderRadius: 10, border: '1px solid rgba(0,0,0,0.05)' }}>
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: color, flexShrink: 0, boxShadow: `0 0 6px ${color}88` }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12.5, fontWeight: 700, color: '#0a1628', lineHeight: 1.2 }}>{role}</div>
                    <div style={{ fontSize: 11, color: '#6b7280', marginTop: 1 }}>{company}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                    <span style={{ fontSize: 10.5, fontWeight: 600, color, background: `${color}18`, padding: '3px 9px', borderRadius: 999 }}>{tag}</span>
                    <span style={{ fontSize: 11, color: '#9ca3af', whiteSpace: 'nowrap' }}>{days}d</span>
                  </div>
                </div>
              ))}
            </div>

            {/* Footer stats */}
            <div style={{ marginTop: 14, paddingTop: 13, borderTop: '1px solid rgba(0,0,0,0.06)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', gap: 20 }}>
                {[{ val: '95%', lbl: 'Retention' }, { val: '6 mo', lbl: 'Avg. time' }, { val: '100%', lbl: 'Local' }].map(({ val, lbl }) => (
                  <div key={lbl}>
                    <div style={{ fontSize: 14, fontWeight: 800, color: '#0a1628', lineHeight: 1 }}>{val}</div>
                    <div style={{ fontSize: 10, color: '#9ca3af', marginTop: 2, fontWeight: 500 }}>{lbl}</div>
                  </div>
                ))}
              </div>
              <a href="build-your-team.html" style={{ fontSize: 12, fontWeight: 700, color: '#1560b0', textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 3 }}>
                View all →
              </a>
            </div>
          </div>

          {/* Floating skill pills */}
          {pills.map(({ label, color, delay, ...pos }) => (
            <div key={label} style={{ position: 'absolute', ...pos, background: '#ffffff', border: `1.5px solid ${color}44`, borderRadius: 999, padding: '6px 13px', fontSize: 11.5, fontWeight: 700, color, boxShadow: '0 4px 14px rgba(0,0,0,0.08)', animation: `floatUD 3s ease-in-out ${delay} infinite alternate`, whiteSpace: 'nowrap', zIndex: 3 }}>
              {label}
            </div>
          ))}
        </div>
      );
    };

    const Hero = () => {
      return (
        <section style={{ background: '#ffffff', minHeight: 'calc(100vh - 90px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 24px', position: 'relative', overflow: 'hidden' }}>

          {/* Grid background */}
          <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(21,96,176,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(21,96,176,0.06) 1px, transparent 1px)', backgroundSize: '48px 48px', pointerEvents: 'none' }} />
          {/* Fade edges */}
          <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 80% 70% at 50% 50%, transparent 40%, #ffffff 100%)', pointerEvents: 'none' }} />

          <div style={{ maxWidth: 860, margin: '0 auto', width: '100%', textAlign: 'center', position: 'relative', zIndex: 1, padding: '48px 0 48px' }}>

            {/* Eyebrow badge */}
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#eef5ff', border: '1px solid #c7ddf8', borderRadius: 9999, padding: '5px 14px', marginBottom: 20 }}>
              <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#1560b0', display: 'inline-block' }} />
              <span style={{ fontSize: 12, fontWeight: 600, color: '#1560b0', letterSpacing: '0.3px' }}>Qatar</span>
            </div>

            {/* H1 — large centered */}
            <h1 style={{ fontSize: 'clamp(2rem, 4.5vw, 4rem)', fontWeight: 900, lineHeight: 1.08, letterSpacing: '-2px', color: '#0a1628', marginBottom: 0, fontFeatureSettings: '"lnum"' }}>
              We Build The<br />
              <span style={{ color: '#1560b0' }}><HeroTyped /></span><br />
              <span style={{ color: '#0a1628' }}>Your Business Needs.</span>
            </h1>

            {/* Subheadline */}
            <p style={{ fontSize: 'clamp(0.9rem, 1.3vw, 1rem)', lineHeight: 1.7, color: '#4b5563', maxWidth: 560, margin: '16px auto 24px', display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
              CertiMinds doesn't fill roles — we craft the professionals. Our Launchpad develops local Qatar talent around your exact technology requirements, assessed and job-ready from day one.
            </p>

            {/* Stats table */}
            <div style={{ marginTop: 32, border: '1px solid rgba(0,0,0,0.1)', borderRadius: 14, overflow: 'hidden', background: '#fff' }}>
              {/* Top row — headings */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', borderBottom: '1px solid rgba(0,0,0,0.08)' }}>
                {[
                  { value: '2% Acceptance Rate' },
                  { value: '100% Qatar-Based Talent' },
                  { value: '3-Track Programme' },
                ].map(({ value }, i) => (
                  <div key={value} style={{ padding: '18px 24px', fontSize: 'clamp(0.85rem, 1.2vw, 1rem)', fontWeight: 800, color: '#0a1628', borderRight: i < 2 ? '1px solid rgba(0,0,0,0.08)' : 'none' }}>
                    {value}
                  </div>
                ))}
              </div>
              {/* Bottom row — subtexts */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr' }}>
                {[
                  { label: 'Rigorous selection, not open enrolment' },
                  { label: 'Qatar-first talent pipeline' },
                  { label: 'Technical · Professional · AI-Native' },
                ].map(({ label }, i) => (
                  <div key={label} style={{ padding: '14px 24px', fontSize: 'clamp(0.8rem, 1.1vw, 0.9rem)', color: '#6b7280', fontWeight: 500, borderRight: i < 2 ? '1px solid rgba(0,0,0,0.08)' : 'none' }}>
                    {label}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ── Audience Cards ────────────────────────────────────────────── */
    const AudienceSection = () => {
      const [hovA, setHovA] = React.useState(false);
      const [hovB, setHovB] = React.useState(false);
      return (
        <section style={{ background: '#f8f9fc', padding: '96px 24px' }}>
          <div style={{ maxWidth: 1100, margin: '0 auto' }}>

            {/* Section label */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 56, justifyContent: 'center' }}>
              <span style={{ width: 28, height: 1, background: '#1560b0', display: 'inline-block' }} />
              <span style={{ fontSize: 11.5, fontWeight: 700, color: '#1560b0', letterSpacing: '1.5px', textTransform: 'uppercase' }}>Who We Work With</span>
              <span style={{ width: 28, height: 1, background: '#1560b0', display: 'inline-block' }} />
            </div>

            {/* Two cards side by side */}
            <div className="hero-ctas" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>

              {/* Card 1 — Organisations */}
              <div onMouseEnter={() => setHovA(true)} onMouseLeave={() => setHovA(false)}
                style={{ position: 'relative', borderRadius: 24, overflow: 'hidden', background: '#0b1120', transition: 'all 0.3s ease', cursor: 'default', minHeight: 380, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '40px 40px 36px', boxShadow: hovA ? '0 32px 80px rgba(11,17,32,0.3)' : '0 8px 32px rgba(11,17,32,0.15)' }}>
                {/* Glow */}
                <div style={{ position: 'absolute', top: -60, right: -60, width: 260, height: 260, borderRadius: '50%', background: 'radial-gradient(circle, rgba(90,163,216,0.18) 0%, transparent 70%)', pointerEvents: 'none', transition: 'opacity 0.3s', opacity: hovA ? 1 : 0.5 }} />
                {/* Number */}
                <div style={{ position: 'absolute', bottom: 20, right: 28, fontSize: 96, fontWeight: 900, color: 'rgba(255,255,255,0.04)', lineHeight: 1, letterSpacing: '-4px', userSelect: 'none' }}>01</div>

                <div style={{ position: 'relative', zIndex: 1 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: 'rgba(90,163,216,0.15)', border: '1px solid rgba(90,163,216,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#5aa3d8', marginBottom: 28 }}>
                    <BuildingIcon />
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: '#5aa3d8', letterSpacing: '1.5px', textTransform: 'uppercase', display: 'block', marginBottom: 14 }}>For organisations</span>
                  <h3 style={{ fontSize: 'clamp(1.4rem, 2vw, 1.9rem)', fontWeight: 800, lineHeight: 1.2, letterSpacing: '-0.5px', color: '#fff', marginBottom: 16 }}>Strengthen<br />Your Team</h3>
                  <p style={{ fontSize: 14.5, lineHeight: 1.75, color: 'rgba(255,255,255,0.5)', maxWidth: 320 }}>We don't forward CVs. We build professionals around your exact technology stack. Assessed, trained, and ready to contribute from day one.</p>
                </div>

                <a href="build-your-team.html" style={{ position: 'relative', zIndex: 1, display: 'inline-flex', alignItems: 'center', gap: 10, marginTop: 32, fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', background: 'rgba(90,163,216,0.15)', border: '1px solid rgba(90,163,216,0.3)', borderRadius: 999, padding: '10px 20px', width: 'fit-content', transition: 'all 0.2s' }}
                  onMouseEnter={e => { e.currentTarget.style.background = 'rgba(90,163,216,0.28)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(0deg)'; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'rgba(90,163,216,0.15)'; e.currentTarget.querySelector('[data-arr]').style.transform = 'rotate(-45deg)'; }}>
                  Build Your Team <span data-arr="1" style={{ display: 'inline-block', transform: 'rotate(-45deg)', transition: 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)', fontSize: 15 }}>→</span>
                </a>
              </div>

              {/* Card 2 — Candidates */}
              <div onMouseEnter={() => setHovB(true)} onMouseLeave={() => setHovB(false)}
                style={{ position: 'relative', borderRadius: 24, overflow: 'hidden', background: '#fff', transition: 'all 0.3s ease', cursor: 'default', minHeight: 380, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '40px 40px 36px', border: '1px solid rgba(45,111,170,0.12)', boxShadow: hovB ? '0 32px 80px rgba(45,111,170,0.14)' : '0 4px 24px rgba(0,0,0,0.06)' }}>
                {/* Glow */}

  <script>
    function setPad(val) {

    function setCtaStyle(val) {
