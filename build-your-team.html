<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Team — CertiMinds</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #fff; color: rgba(0,0,0,0.95); -webkit-font-smoothing: antialiased; }
    @media (max-width: 768px) {
      .nav-links, .nav-cta { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .footer-grid { grid-template-columns: 1fr 1fr !important; }
      .step-detail-grid { grid-template-columns: 1fr !important; }
    }
    @media (max-width: 520px) {
      .footer-grid { grid-template-columns: 1fr !important; }
    }
    /* ── Scroll Reveal ─────────────────────────────────────── */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">


/* ── Nav ──────────────────────────────────────────────────────── */
const Nav = () => {
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);
  const [hidden, setHidden] = React.useState(false);
  const lastY = React.useRef(0);

  React.useEffect(() => {
    const fn = () => {
      const y = window.scrollY;
      setScrolled(y > 16);
      if (y > lastY.current && y > 80) setHidden(true);
      else setHidden(false);
      lastY.current = y;
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const links = [
    { label: 'Build Your Team',   href: 'build-your-team.html' },
    { label: 'Build Your Career', href: 'build-your-career.html' },
    { label: 'Our Launchpad',     href: 'our-launchpad.html' },
    { label: 'About Us',          href: 'about-us.html' },
    { label: 'Contact',           href: 'contact.html' },
  ];

  return (
    <header style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: '#ffffff',
      borderBottom: scrolled ? '1px solid rgba(0,0,0,0.08)' : '1px solid transparent',
      boxShadow: scrolled ? '0 2px 16px rgba(0,0,0,0.06)' : 'none',
      transform: hidden ? 'translateY(-100%)' : 'translateY(0)',
      transition: 'transform 0.35s cubic-bezier(0.4,0,0.2,1), border-color 0.3s, box-shadow 0.3s',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 32px', height: 82, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16 }}>
        <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none', flexShrink: 0 }}>
          <img src="uploads/CertiMinds Blue Final-7e7cb488.png" alt="CertiMinds" style={{ height: 52 }} />
        </a>
        <div className="nav-links" style={{ display: 'flex', alignItems: 'center', gap: 0, flex: 1, justifyContent: 'center' }}>
          {links.map(({ label, href }) => {
            const isActive = window.location.pathname.includes('build-your-team') && href === 'build-your-team.html';
            return (
              <a key={label} href={href} style={{
                fontSize: 13.5, fontWeight: isActive ? 600 : 500,
                color: isActive ? '#0a1628' : '#111111',
                padding: '8px 16px', textDecoration: 'none', borderRadius: 6,
                transition: 'color 0.18s', whiteSpace: 'nowrap',
              }}
              onMouseEnter={e => e.currentTarget.style.color = '#0a1628'}
              onMouseLeave={e => e.currentTarget.style.color = isActive ? '#0a1628' : '#111111'}>
                {label}
              </a>
            );
          })}
        </div>
        <div className="nav-cta" style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
          <a href="contact.html"
            style={{ display: 'inline-flex', alignItems: 'center', fontSize: 13.5, fontWeight: 700, color: '#fff', textDecoration: 'none', padding: '9px 22px', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', borderRadius: 9999, border: 'none', transition: 'all 0.2s', whiteSpace: 'nowrap', boxShadow: '0 4px 14px rgba(109,40,217,0.3)' }}
            onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.boxShadow = '0 6px 20px rgba(109,40,217,0.45)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.boxShadow = '0 4px 14px rgba(109,40,217,0.3)'; }}>
            Let's Talk
          </a>
        </div>
        <button className="nav-hamburger" style={{ display: 'none', flexDirection: 'column', gap: 5, background: 'transparent', border: 'none', cursor: 'pointer', padding: '8px' }}
          onClick={() => setMenuOpen(!menuOpen)} aria-label="Menu">
          {[0,1,2].map(i => (
            <span key={i} style={{ width: 22, height: 2, background: '#0a1628', borderRadius: 2, display: 'block', transition: 'all 0.22s',
              transform: i===0 && menuOpen ? 'rotate(45deg) translateY(7px)' : i===2 && menuOpen ? 'rotate(-45deg) translateY(-7px)' : 'none',
              opacity: i===1 && menuOpen ? 0 : 1 }} />
          ))}
        </button>
      </div>
      {menuOpen && (
        <div style={{ borderTop: '1px solid rgba(0,0,0,0.07)', padding: '12px 24px 20px', display: 'flex', flexDirection: 'column', gap: 2, background: '#ffffff' }}>
          {links.map(({ label, href }) => (
            <a key={label} href={href} style={{ fontSize: 14, fontWeight: 500, color: '#111111', padding: '11px 12px', borderRadius: 8, textDecoration: 'none' }}>{label}</a>
          ))}
          <a href="contact.html" style={{ textAlign: 'center', background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 13.5, fontWeight: 700, padding: '10px 16px', borderRadius: 9999, textDecoration: 'none', marginTop: 10 }}>Let's Talk</a>
        </div>
      )}
    </header>
  );
};

/* ── Hero ─────────────────────────────────────────────────────── */
const Hero = () => {
  const stats = [
    { value: '200+', label: 'Professionals Placed' },
    { value: '95%',  label: 'Client Retention' },
    { value: '18d',  label: 'Avg. Time to Fill' },
    { value: '100%', label: 'Qatar-Based Talent' },
  ];
  const tracks = ['AI & Data', 'Cloud & Infra', 'Cybersecurity', 'Software Eng.', 'Business Analysis'];
  const [activeTrack, setActiveTrack] = React.useState(0);
  React.useEffect(() => {
    const t = setInterval(() => setActiveTrack(p => (p + 1) % tracks.length), 2000);
    return () => clearInterval(t);
  }, []);

  return (
    <section style={{ background: '#ffffff', paddingTop: 72, paddingBottom: 0, position: 'relative', overflow: 'hidden' }}>
      {/* grid bg */}
      <div style={{ position: 'absolute', inset: 0, backgroundImage: 'linear-gradient(rgba(21,96,176,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(21,96,176,0.05) 1px, transparent 1px)', backgroundSize: '48px 48px', pointerEvents: 'none' }} />
      <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 80% 60% at 60% 40%, transparent 30%, #ffffff 100%)', pointerEvents: 'none' }} />

      <div style={{ maxWidth: 1160, margin: '0 auto', padding: '60px 32px 0', position: 'relative', zIndex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center' }}>

        {/* LEFT */}
        <div>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: '#eef5ff', border: '1px solid #c7ddf8', borderRadius: 9999, padding: '5px 14px', marginBottom: 28 }}>
            
            <span style={{ fontSize: 12, fontWeight: 600, color: '#1560b0' }}>For Organisations · Qatar</span>
          </div>

          <h1 style={{ fontSize: 'clamp(2.2rem, 3.8vw, 3.4rem)', fontWeight: 900, lineHeight: 1.08, letterSpacing: '-2px', color: '#0a1628', marginBottom: 20 }}>
            The Tech Professionals<br />
            <span style={{ color: '#1560b0' }}>Your Organization</span><br />
            Has Been Looking For
          </h1>

          <p style={{ fontSize: '1.05rem', lineHeight: 1.75, color: '#111111', maxWidth: 500, marginBottom: 32 }}>
            Finding AI-native professionals with leading technology and business skills in Qatar is harder than it should be. We solve that — developing and placing the right talent directly with your organization.
          </p>

          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center', marginBottom: 40 }}>
            <a href="contact.html"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'linear-gradient(135deg, #6d28d9, #3b82f6)', color: '#fff', fontSize: 15, fontWeight: 700, padding: '14px 28px', borderRadius: 9999, textDecoration: 'none', transition: 'all 0.2s', boxShadow: '0 4px 18px rgba(109,40,217,0.28)' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #5b21b6, #2563eb)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 28px rgba(109,40,217,0.45)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'linear-gradient(135deg, #6d28d9, #3b82f6)'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 4px 18px rgba(109,40,217,0.28)'; }}>
              Request a Consultation →
            </a>
            <a href="our-launchpad.html"
              style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'transparent', color: '#0a1628', fontSize: 15, fontWeight: 600, padding: '14px 28px', borderRadius: 9999, textDecoration: 'none', border: '1.5px solid rgba(10,22,40,0.18)', transition: 'all 0.2s' }}
              onMouseEnter={e => { e.currentTarget.style.background = '#f0f7ff'; e.currentTarget.style.borderColor = '#1560b0'; e.currentTarget.style.color = '#1560b0'; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'rgba(10,22,40,0.18)'; e.currentTarget.style.color = '#0a1628'; }}>
              See the Launchpad
            </a>
          </div>

          {/* trust strip */}
          <div style={{ display: 'flex', gap: 24, paddingTop: 24, borderTop: '1px solid rgba(0,0,0,0.08)', flexWrap: 'nowrap' }}>
            {[
              { icon: '✓', text: 'Qatar-Based Talent' },
              { icon: '✓', text: 'Day-one Productive' },
              { icon: '✓', text: 'Assessed Before Arrival' },
            ].map(({ icon, text }) => (
              <div key={text} style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                <span style={{ width: 18, height: 18, borderRadius: '50%', background: 'rgba(21,96,176,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: '#1560b0', fontWeight: 800, flexShrink: 0 }}>{icon}</span>
                <span style={{ fontSize: 13, fontWeight: 600, color: '#111111' }}>{text}</span>
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT — visual card replaced with image */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 420 }}>
          <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=900&q=80" alt="Tech team collaboration" style={{ maxWidth: 440, width: '100%', borderRadius: 24, boxShadow: '0 8px 32px rgba(21,96,176,0.18)', objectFit: 'cover', height: 420 }} />
        </div>

      </div>

      {/* bottom wave separator */}
      <div style={{ marginTop: 60, lineHeight: 0 }}>
        <svg viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ width: '100%', display: 'block' }}>
          <path d="M0 60V30C360 0 720 60 1080 30 1260 15 1380 20 1440 30V60H0Z" fill="#f8f9fc"/>
        </svg>
      </div>
    </section>
  );
};


/* ── Icons ────────────────────────────────────────────────────── */
const iconProps = { width: 22, height: 22, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "1.75", strokeLinecap: "round", strokeLinejoin: "round" };
const DiscoverIcon = () => <svg {...iconProps}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /><path d="M11 8v6" /><path d="M8 11h6" /></svg>;
const SelectIcon = () => <svg {...iconProps}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>;
const DevelopIcon = () => <svg {...iconProps}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>;
const AlignIcon = () => <svg {...iconProps}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>;
const PlaceIcon = () => <svg {...iconProps}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>;
const GrowIcon = () => <svg {...iconProps}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><polyline points="17 6 23 6 23 12" /></svg>;

/* ── Engagement Model ─────────────────────────────────────────── */
const STEPS = [
{
  n: '01', label: 'Tell us what you need',
  body: "Share the capability areas you are looking to fill. We take it from there.",
  detail: 'No obligation to start',
  icon: <DiscoverIcon />
},
{
  n: '02', label: 'We find the right fit',
  body: 'We match you with a tech consultant developed around your requirements, with hands-on experience in the latest AI tools.',
  detail: 'Shortlisted within days',
  icon: <SelectIcon />
},
{
  n: '03', label: 'Review and confirm',
  body: 'You review the profile and confirm the fit. No obligation until you are ready.',
  detail: 'You stay in control',
  icon: <AlignIcon />
},
{
  n: '04', label: 'They join your team',
  body: 'Your consultant starts on a direct monthly contract. Zero upfront cost. No placement fees.',
  detail: 'Direct monthly contract',
  icon: <PlaceIcon />
},
{
  n: '05', label: 'We stay involved',
  body: 'We provide ongoing technical support throughout the entire engagement. You are never managing this alone.',
  detail: 'Ongoing support included',
  icon: <DevelopIcon />
},
{
  n: '06', label: 'They grow with you',
  body: 'Every consultant has a structured growth path. When the time is right, convert them into a permanent full-time member of your team at no additional cost.',
  detail: 'Convert to FTE anytime',
  icon: <GrowIcon />
}];


const EngagementModel = () => {
  const [activeStep, setActiveStep] = React.useState(0);
  const step = STEPS[activeStep];

  return (
    <section style={{ background: '#ffffff', padding: '96px 24px', borderTop: '1px solid rgba(0,0,0,0.06)' }}>
      <div style={{ maxWidth: 1160, margin: '0 auto' }}>

        {/* Header */}
        <div style={{ marginBottom: 48 }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16 }}>
            <h2 style={{ fontSize: 'clamp(2rem, 4vw, 3rem)', fontWeight: 900, lineHeight: 1.15, letterSpacing: '-2px', margin: 0, paddingBottom: 6, background: 'linear-gradient(135deg, #0a1628 0%, #1560b0 45%, #7c3aed 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>Working With Us</h2>
            <p style={{ fontSize: '0.95rem', color: '#111111', maxWidth: 340, lineHeight: 1.7, margin: 0 }}>A transparent, low-friction process from first conversation to placed consultant.</p>
          </div>
        </div>

        {/* Step pills */}
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 32, borderBottom: '1px solid rgba(0,0,0,0.07)', paddingBottom: 24 }}>
          {STEPS.map((s, i) => (
            <button key={i} onClick={() => setActiveStep(i)}
              style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 18px', borderRadius: 9999,
                border: i === activeStep ? '1.5px solid #1560b0' : '1.5px solid rgba(0,0,0,0.09)',
                background: i === activeStep ? '#1560b0' : i < activeStep ? '#f0f7ff' : '#ffffff',
                color: i === activeStep ? '#fff' : i < activeStep ? '#1560b0' : 'rgba(0,0,0,0.5)',
                fontWeight: 600, fontSize: 13, cursor: 'pointer', transition: 'all 0.18s', fontFamily: 'inherit' }}>
              {i < activeStep
                ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#1560b0" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                : <span style={{ fontSize: 10, fontWeight: 800, opacity: i === activeStep ? 0.7 : 0.4, letterSpacing: '0.5px' }}>{s.n}</span>
              }
              {s.label}
            </button>
          ))}
        </div>

        {/* Step detail card */}
        <div style={{ background: '#fff', border: '1px solid rgba(0,0,0,0.08)', borderRadius: 20, overflow: 'hidden', boxShadow: '0 8px 40px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03)' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 0.9fr' }} className="step-detail-grid">

            {/* Left: step content */}
            <div style={{ padding: '52px 52px 48px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 32 }}>
                <div style={{ width: 52, height: 52, borderRadius: 14, background: 'linear-gradient(135deg, rgba(21,96,176,0.1), rgba(21,96,176,0.06))', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#1560b0', flexShrink: 0 }}>
                  {step.icon}
                </div>
                <div>
                  <div style={{ fontSize: 10.5, fontWeight: 700, color: '#111111', letterSpacing: '1.5px', textTransform: 'uppercase', marginBottom: 3 }}>Step {step.n} of {STEPS.length}</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: '#1560b0', lineHeight: 1 }}>{step.label}</div>
                </div>
              </div>

              <h3 style={{ fontSize: 'clamp(1.4rem, 2.5vw, 1.75rem)', fontWeight: 800, lineHeight: 1.2, letterSpacing: '-0.75px', color: '#0a1628', marginBottom: 16 }}>{step.headline}</h3>
              <p style={{ fontSize: 15, lineHeight: 1.8, color: '#111111', marginBottom: 32 }}>{step.body}</p>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, background: '#eef5ff', border: '1px solid #c7ddf8', color: '#1560b0', fontSize: 12, fontWeight: 600, padding: '6px 14px', borderRadius: 9999 }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  {step.detail}
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button onClick={() => setActiveStep(Math.max(0, activeStep - 1))}
                    style={{ width: 36, height: 36, borderRadius: 9999, border: '1.5px solid rgba(0,0,0,0.12)', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: activeStep === 0 ? 'default' : 'pointer', opacity: activeStep === 0 ? 0.3 : 1, transition: 'all 0.15s', fontFamily: 'inherit' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  </button>
                  <button onClick={() => setActiveStep(Math.min(STEPS.length - 1, activeStep + 1))}
                    style={{ width: 36, height: 36, borderRadius: 9999, border: '1.5px solid rgba(0,0,0,0.12)', background: activeStep === STEPS.length - 1 ? '#fff' : '#0a1628', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: activeStep === STEPS.length - 1 ? 'default' : 'pointer', opacity: activeStep === STEPS.length - 1 ? 0.3 : 1, transition: 'all 0.15s', fontFamily: 'inherit', color: activeStep === STEPS.length - 1 ? '#000' : '#fff' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                </div>
              </div>
            </div>

            {/* Right: step list */}
            <div style={{ background: '#f8f9fc', borderLeft: '1px solid rgba(0,0,0,0.06)', padding: '40px 32px', display: 'flex', flexDirection: 'column', gap: 2 }}>
              {STEPS.map((s, i) => (
                <button key={i} onClick={() => setActiveStep(i)}
                  style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '13px 14px', borderRadius: 10, border: 'none',
                    background: i === activeStep ? '#ffffff' : 'transparent',
                    cursor: 'pointer', textAlign: 'left', transition: 'all 0.15s', fontFamily: 'inherit',
                    boxShadow: i === activeStep ? '0 2px 12px rgba(0,0,0,0.06)' : 'none' }}>
                  <div style={{ width: 30, height: 30, borderRadius: '50%', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s',
                    border: `2px solid ${i === activeStep ? '#1560b0' : i < activeStep ? '#c7ddf8' : 'rgba(0,0,0,0.12)'}`,
                    background: i === activeStep ? '#1560b0' : i < activeStep ? '#eef5ff' : 'transparent' }}>
                    {i < activeStep
                      ? <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#1560b0" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      : <span style={{ fontSize: 10, fontWeight: 800, color: i === activeStep ? '#fff' : 'rgba(0,0,0,0.35)', letterSpacing: '0.3px' }}>{s.n}</span>
                    }
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: i === activeStep ? '#0a1628' : 'rgba(0,0,0,0.55)', lineHeight: 1.3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.label}</div>
                    <div style={{ fontSize: 11.5, color: '#111111', marginTop: 2 }}>{s.detail}</div>
                  </div>
                  {i === activeStep && (
                    <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#1560b0', flexShrink: 0 }} />
                  )}
                </button>
              ))}
            </div>

          </div>
        </div>

        {/* Progress bar */}
        <div style={{ marginTop: 16, height: 3, background: 'rgba(0,0,0,0.06)', borderRadius: 99, overflow: 'hidden' }}>

  <script>
  (function(){
    if(!('IntersectionObserver' in window))return;
    var io=new IntersectionObserver(function(ens){ens.forEach(function(en){if(en.isIntersecting){var el=en.target;el.style.opacity='1';el.style.transform='none';io.unobserve(el);}});},{threshold:0.09,rootMargin:'0px 0px -32px 0px'});
    function boot(){document.querySelectorAll('section,footer').forEach(function(el){var r=el.getBoundingClientRect();if(r.top>=window.innerHeight*0.88){el.style.cssText+=';opacity:0;transform:translateY(26px);transition:opacity 0.7s ease,transform 0.7s ease;';io.observe(el);}});}
    var root=document.getElementById('root');
    if(root&&root.firstChild){boot();}
    else if(root){var mo=new MutationObserver(function(){if(root.firstChild){mo.disconnect();setTimeout(boot,80);}});mo.observe(root,{childList:true});}
  })();
  </script>
